<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Mimes Care Corp - Preview</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: linear-gradient(180deg, #E8EAF6 0%, #FCE4EC 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    font-family: Arial, sans-serif;
    overflow-x: hidden;
  }
  h1 {
    color: #5C6BC0;
    font-size: 22px;
    margin-top: 14px;
    text-shadow: 0 1px 2px rgba(255,255,255,0.8);
  }
  .subtitle { color: #9E9E9E; font-size: 12px; margin-top: 2px; }
  canvas { margin-top: 6px; touch-action: none; }
  .labels {
    display: flex; width: 100%; max-width: 420px;
    justify-content: space-around; margin-top: 4px;
  }
  .label {
    font-size: 13px; font-weight: bold;
    text-shadow: 0 1px 2px rgba(255,255,255,0.8);
    text-align: center;
  }
  .label small { display: block; font-weight: normal; font-size: 10px; color: #999; margin-top: 1px; }
  .mood-selector {
    display: flex; gap: 6px; margin-top: 10px;
    flex-wrap: wrap; justify-content: center; padding: 0 8px;
  }
  .mood-btn {
    padding: 5px 10px; border: 2px solid #C5CAE9; border-radius: 20px;
    background: white; font-size: 12px; cursor: pointer; transition: all 0.2s;
  }
  .mood-btn.active { background: #5C6BC0; color: white; border-color: #5C6BC0; }
  .hint { color: #BDBDBD; font-size: 11px; margin-top: 8px; }
</style>
</head>
<body>

<h1>Mimes Care Corp</h1>
<p class="subtitle">Preview de personalidades</p>
<canvas id="c"></canvas>
<div class="labels">
  <div class="label" style="color:#0288D1">Aventurero<small>Pelo revuelto</small></div>
  <div class="label" style="color:#7E57C2">Tranquilo<small>Pelo peinado</small></div>
  <div class="label" style="color:#EF6C00">P&iacute;caro<small>Pelo con estilo</small></div>
</div>
<div class="mood-selector">
  <button class="mood-btn active" data-mood="contento">😊 Contento</button>
  <button class="mood-btn" data-mood="euforico">🤩 Euf&oacute;rico</button>
  <button class="mood-btn" data-mood="triste">😢 Triste</button>
  <button class="mood-btn" data-mood="enfadado">😠 Enfadado</button>
  <button class="mood-btn" data-mood="dormido">😴 Dormido</button>
</div>
<p class="hint">Toca un Mime para interactuar</p>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = Math.min(window.innerWidth, 420);
const H = Math.round(W * 1.2);
canvas.width = W * 2;
canvas.height = H * 2;
canvas.style.width = W + 'px';
canvas.style.height = H + 'px';
ctx.scale(2, 2);

// === HELPERS ===
function hexRgb(h) { return { r: (h >> 16) & 255, g: (h >> 8) & 255, b: h & 255 }; }
function rgb(r, g, b, a = 1) { return `rgba(${r|0},${g|0},${b|0},${a})`; }
function col(h, a = 1) { const c = hexRgb(h); return rgb(c.r, c.g, c.b, a); }
function dk(h, n = 50) { const c = hexRgb(h); return { r: Math.max(0,c.r-n), g: Math.max(0,c.g-n), b: Math.max(0,c.b-n) }; }
function lt(h, n = 50) { const c = hexRgb(h); return { r: Math.min(255,c.r+n), g: Math.min(255,c.g+n), b: Math.min(255,c.b+n) }; }
function ell(x, y, rx, ry) { ctx.beginPath(); ctx.ellipse(x, y, Math.abs(rx), Math.abs(ry), 0, 0, Math.PI*2); ctx.fill(); }
function tri(x1,y1,x2,y2,x3,y3) { ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.lineTo(x3,y3); ctx.closePath(); ctx.fill(); }

// Draw a heart shape at (cx, cy) with given size
function drawHeart(cx, cy, size) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.beginPath();
  const s = size;
  ctx.moveTo(0, s * 0.3);
  ctx.bezierCurveTo(-s * 0.5, -s * 0.3, -s, s * 0.1, 0, s);
  ctx.moveTo(0, s * 0.3);
  ctx.bezierCurveTo(s * 0.5, -s * 0.3, s, s * 0.1, 0, s);
  ctx.fill();
  ctx.restore();
}

// === MIMES ===
const mimes = [
  { color: 0x81D4FA, personality: 'aventurero',
    x: W/4, y: H*0.62, speed: 0.7, amp: 1.4, bounce: 0, phase: 0 },
  { color: 0xB39DDB, personality: 'tranquilo',
    x: W/2, y: H*0.62, speed: 1.5, amp: 0.6, bounce: 0, phase: 1 },
  { color: 0xFFCC80, personality: 'picaro',
    x: W*3/4, y: H*0.62, speed: 0.9, amp: 1.0, bounce: 0, phase: 2 },
];

let currentMood = 'contento';
let blinkTimer = 2000, blinkState = 0;

// === DRAW MIME ===
function drawMime(m, t) {
  const c = m.color;
  const d = dk(c); const l = lt(c);
  const breathe = Math.sin(t / (600 * m.speed)) * m.amp;
  const pupilX = Math.sin(t / 1200) * 2.5;
  const earWig = Math.sin(t / (1000 * m.speed)) * 4 * m.amp;
  const handWig = Math.sin(t / (800 * m.speed)) * 6 * m.amp;
  const mood = currentMood;

  let by = 0;
  if (m.bounce > 0) {
    by = -Math.sin(m.bounce * Math.PI) * 20;
    m.bounce = Math.max(0, m.bounce - 0.025);
  }

  const S = 0.7; // scale
  ctx.save();
  ctx.translate(m.x, m.y + by);
  ctx.scale(S, S);

  // ============ TWO-BALL BODY: head + torso ============
  const torsoR = 42;    // torso ball radius
  const headR = 38;     // head ball radius
  const torsoY = -torsoR; // torso center
  const headY = torsoY - torsoR - headR + 20; // head overlaps torso slightly

  ctx.save();
  ctx.translate(0, 0);
  ctx.scale(1, 1 + breathe * 0.004);

  // Shadow on ground
  ctx.fillStyle = 'rgba(0,0,0,0.08)';
  ell(0, 8, torsoR * 0.8, 8);

  // === PATITAS (close to body bottom) ===
  ctx.fillStyle = rgb(d.r, d.g, d.b);
  ell(-16, -2, 14, 10);
  ell(16, -2, 14, 10);
  ctx.strokeStyle = rgb(d.r, d.g, d.b, 0.5);
  ctx.lineWidth = 1.2;
  [-22, -16, -10].forEach(x => {
    ctx.beginPath(); ctx.moveTo(x, -6); ctx.lineTo(x, 0); ctx.stroke();
  });
  [10, 16, 22].forEach(x => {
    ctx.beginPath(); ctx.moveTo(x, -6); ctx.lineTo(x, 0); ctx.stroke();
  });

  // === TORSO (lower ball) ===
  ctx.fillStyle = col(c);
  ell(0, torsoY, torsoR, torsoR);

  // Belly on torso
  ctx.fillStyle = rgb(l.r, l.g, l.b, 0.8);
  ell(0, torsoY + 4, torsoR * 0.65, torsoR * 0.7);

  // Torso outline
  ctx.strokeStyle = rgb(d.r, d.g, d.b, 0.15);
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.ellipse(0, torsoY, torsoR, torsoR, 0, 0, Math.PI * 2); ctx.stroke();

  // === HEAD (upper ball) ===
  ctx.fillStyle = col(c);
  ell(0, headY, headR, headR);

  // Head outline
  ctx.strokeStyle = rgb(d.r, d.g, d.b, 0.15);
  ctx.beginPath(); ctx.ellipse(0, headY, headR, headR, 0, 0, Math.PI * 2); ctx.stroke();

  ctx.restore(); // breathe

  // ============ HANDS (heart shape, on torso sides) ============
  ctx.save();
  ctx.translate(-torsoR - 8, torsoY);
  ctx.rotate((handWig - 5) * Math.PI / 180);
  ctx.fillStyle = col(c);
  drawHeart(0, -8, 13);
  ctx.restore();

  ctx.save();
  ctx.translate(torsoR + 8, torsoY);
  ctx.rotate((-handWig + 5) * Math.PI / 180);
  ctx.fillStyle = col(c);
  drawHeart(0, -8, 13);
  ctx.restore();

  // ============ CAT EARS (on head) ============
  const earY = headY - headR + 6;

  ctx.save();
  ctx.translate(-18, earY);
  ctx.rotate((-10 + earWig) * Math.PI / 180);
  ctx.fillStyle = col(c);
  tri(0, 5, -10, -16, 10, -16);
  ctx.fillStyle = 'rgba(255,171,145,0.5)';
  tri(0, 0, -6, -12, 6, -12);
  ctx.restore();

  ctx.save();
  ctx.translate(18, earY);
  ctx.rotate((10 - earWig) * Math.PI / 180);
  ctx.fillStyle = col(c);
  tri(0, 5, -10, -16, 10, -16);
  ctx.fillStyle = 'rgba(255,171,145,0.5)';
  tri(0, 0, -6, -12, 6, -12);
  ctx.restore();

  // ============ HAIR / PELO (on top of head) ============
  const hairY = headY - headR + 4;
  const hairColor = rgb(d.r - 30, d.g - 30, d.b - 30);

  if (m.personality === 'aventurero') {
    // Messy, spiky hair - revuelto
    ctx.fillStyle = hairColor;
    tri(-25, hairY + 14, -15, hairY - 18, -2, hairY + 8);
    tri(-10, hairY + 10, 0, hairY - 22, 12, hairY + 6);
    tri(5, hairY + 12, 18, hairY - 16, 28, hairY + 10);
    tri(-18, hairY + 12, -8, hairY - 14, 5, hairY + 10);
    tri(0, hairY + 8, 10, hairY - 20, 22, hairY + 8);
    // Extra wild tufts
    tri(-22, hairY + 10, -30, hairY - 8, -12, hairY + 6);
    tri(15, hairY + 8, 30, hairY - 10, 25, hairY + 10);
  } else if (m.personality === 'tranquilo') {
    // Neat, smooth hair - peinado suave
    ctx.fillStyle = hairColor;
    ctx.beginPath();
    ctx.moveTo(-28, hairY + 16);
    ctx.quadraticCurveTo(-30, hairY - 5, -10, hairY - 14);
    ctx.quadraticCurveTo(0, hairY - 18, 10, hairY - 14);
    ctx.quadraticCurveTo(30, hairY - 5, 28, hairY + 16);
    ctx.quadraticCurveTo(15, hairY + 8, 0, hairY + 10);
    ctx.quadraticCurveTo(-15, hairY + 8, -28, hairY + 16);
    ctx.fill();
    // A little swoosh
    ctx.beginPath();
    ctx.moveTo(10, hairY - 14);
    ctx.quadraticCurveTo(20, hairY - 22, 14, hairY - 10);
    ctx.fill();
  } else if (m.personality === 'picaro') {
    // Styled hair with a quiff/flick - con estilo
    ctx.fillStyle = hairColor;
    ctx.beginPath();
    ctx.moveTo(-26, hairY + 16);
    ctx.quadraticCurveTo(-28, hairY, -12, hairY - 10);
    ctx.quadraticCurveTo(0, hairY - 16, 12, hairY - 10);
    ctx.quadraticCurveTo(26, hairY - 4, 28, hairY + 16);
    ctx.quadraticCurveTo(10, hairY + 8, 0, hairY + 10);
    ctx.quadraticCurveTo(-12, hairY + 8, -26, hairY + 16);
    ctx.fill();
    // Quiff to the side
    tri(16, hairY - 8, 32, hairY - 26, 26, hairY - 4);
    tri(20, hairY - 10, 36, hairY - 20, 30, hairY - 2);
    // A little curl
    ctx.beginPath();
    ctx.moveTo(-18, hairY - 6);
    ctx.quadraticCurveTo(-26, hairY - 18, -14, hairY - 8);
    ctx.fill();
  }

  // ============ EYES (big, on head) ============
  const eyeY = headY - 4;
  const eyeSpacing = 18;
  const eyeRX = 14, eyeRY = 16;

  if (mood === 'dormido') {
    // Closed eyes - curved lines
    ctx.strokeStyle = '#444';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.arc(-eyeSpacing, eyeY, 10, 0.2, Math.PI - 0.2);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(eyeSpacing, eyeY, 10, 0.2, Math.PI - 0.2);
    ctx.stroke();
    // ZZZ floating
    ctx.fillStyle = '#9E9E9E';
    ctx.font = 'bold 14px Arial';
    ctx.fillText('z', 34, headY - 30 + Math.sin(t/500)*4);
    ctx.font = 'bold 18px Arial';
    ctx.fillText('Z', 42, headY - 46 + Math.sin(t/500+1)*4);
  } else {
    const eyeYOff = mood === 'triste' ? 3 : 0;

    // Eye whites
    ctx.fillStyle = '#fff';
    ell(-eyeSpacing, eyeY + eyeYOff, eyeRX, eyeRY);
    ell(eyeSpacing, eyeY + eyeYOff, eyeRX, eyeRY);

    // Eye outline
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.ellipse(-eyeSpacing, eyeY + eyeYOff, eyeRX, eyeRY, 0, 0, Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.ellipse(eyeSpacing, eyeY + eyeYOff, eyeRX, eyeRY, 0, 0, Math.PI*2); ctx.stroke();

    // Pupils (if not blinking)
    if (blinkState < 2) {
      const pR = mood === 'euforico' ? 10 : mood === 'enfadado' ? 6 : 8;
      ctx.fillStyle = '#1a1a2e';
      ell(-eyeSpacing + pupilX, eyeY + eyeYOff + 1, pR, pR + 1);
      ell(eyeSpacing + pupilX, eyeY + eyeYOff + 1, pR, pR + 1);

      // Shine
      ctx.fillStyle = '#fff';
      ell(-eyeSpacing + pupilX + 4, eyeY + eyeYOff - 3, 3.5, 3.5);
      ell(eyeSpacing + pupilX + 4, eyeY + eyeYOff - 3, 3.5, 3.5);
      ell(-eyeSpacing + pupilX - 2, eyeY + eyeYOff + 3, 1.8, 1.8);
      ell(eyeSpacing + pupilX - 2, eyeY + eyeYOff + 3, 1.8, 1.8);
    }

    // Blink
    if (blinkState >= 2) {
      ctx.fillStyle = col(c);
      ell(-eyeSpacing, eyeY + eyeYOff, eyeRX + 1, eyeRY + 1);
      ell(eyeSpacing, eyeY + eyeYOff, eyeRX + 1, eyeRY + 1);
    }

    // Eyebrows
    if (mood === 'enfadado') {
      ctx.strokeStyle = '#333';
      ctx.lineWidth = 3.5;
      ctx.beginPath(); ctx.moveTo(-eyeSpacing - 14, eyeY - 20); ctx.lineTo(-eyeSpacing + 6, eyeY - 16); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(eyeSpacing + 14, eyeY - 20); ctx.lineTo(eyeSpacing - 6, eyeY - 16); ctx.stroke();
    } else if (mood === 'triste') {
      ctx.strokeStyle = rgb(d.r, d.g, d.b, 0.6);
      ctx.lineWidth = 2.5;
      ctx.beginPath(); ctx.moveTo(-eyeSpacing - 12, eyeY - 16); ctx.lineTo(-eyeSpacing + 8, eyeY - 20); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(eyeSpacing + 12, eyeY - 16); ctx.lineTo(eyeSpacing - 8, eyeY - 20); ctx.stroke();
    } else {
      // Normal/happy subtle brows
      ctx.strokeStyle = rgb(d.r, d.g, d.b, 0.4);
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(-eyeSpacing, eyeY - 14, 12, Math.PI + 0.4, -0.4);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(eyeSpacing, eyeY - 14, 12, Math.PI + 0.4, -0.4);
      ctx.stroke();
    }
  }

  // ============ MOUTH (big and expressive, on head) ============
  const mouthY = headY + 16;

  if (mood === 'euforico') {
    // Big open smile
    ctx.fillStyle = '#333';
    ctx.beginPath();
    ctx.moveTo(-22, mouthY - 2);
    ctx.quadraticCurveTo(-24, mouthY - 4, -20, mouthY - 4);
    ctx.quadraticCurveTo(0, mouthY + 28, 20, mouthY - 4);
    ctx.quadraticCurveTo(24, mouthY - 4, 22, mouthY - 2);
    ctx.quadraticCurveTo(0, mouthY + 32, -22, mouthY - 2);
    ctx.fill();
    // Tongue
    ctx.fillStyle = '#E53935';
    ell(0, mouthY + 16, 8, 6);
    // Smile lines
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(-22, mouthY - 2); ctx.lineTo(-26, mouthY - 5); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(22, mouthY - 2); ctx.lineTo(26, mouthY - 5); ctx.stroke();
  } else if (mood === 'contento') {
    // Nice wide smile
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(-18, mouthY);
    ctx.quadraticCurveTo(0, mouthY + 20, 18, mouthY);
    ctx.stroke();
    // Smile lines
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(-18, mouthY); ctx.lineTo(-22, mouthY - 3); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(18, mouthY); ctx.lineTo(22, mouthY - 3); ctx.stroke();
  } else if (mood === 'triste') {
    // Frown
    ctx.strokeStyle = '#555';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(-14, mouthY + 8);
    ctx.quadraticCurveTo(0, mouthY - 6, 14, mouthY + 8);
    ctx.stroke();
  } else if (mood === 'enfadado') {
    // Tight angry line
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 3.5;
    ctx.beginPath();
    ctx.moveTo(-14, mouthY + 2);
    ctx.lineTo(14, mouthY + 4);
    ctx.stroke();
  } else if (mood === 'dormido') {
    // Small sleeping mouth
    ctx.fillStyle = '#555';
    ell(0, mouthY + 4, 5, 4);
  }

  // ============ CHEEKS (blush, on head) ============
  if (mood !== 'enfadado') {
    ctx.fillStyle = 'rgba(255,150,130,0.25)';
    ell(-28, headY + 8, 10, 7);
    ell(28, headY + 8, 10, 7);
  }

  // ============ NOSE (tiny cat/penguin nose, on head) ============
  ctx.fillStyle = 'rgba(255,150,130,0.9)';
  tri(0, headY + 4, -4, headY + 10, 4, headY + 10);

  ctx.restore();
}

// === FLOOR ===
function drawFloor() {
  ctx.fillStyle = 'rgba(188,170,164,0.25)';
  ctx.fillRect(0, H - 55, W, 55);
  ctx.fillStyle = 'rgba(200,190,180,0.2)';
  ctx.fillRect(0, H - 55, W, 2);
}

// === BLINK ===
function updateBlink(dt) {
  blinkTimer -= dt;
  if (blinkTimer <= 0) {
    if (blinkState === 0) { blinkState = 1; blinkTimer = 60; }
    else if (blinkState === 1) { blinkState = 2; blinkTimer = 80; }
    else if (blinkState === 2) { blinkState = 3; blinkTimer = 60; }
    else { blinkState = 0; blinkTimer = 2500 + Math.random() * 2000; }
  }
}

// === INTERACTION ===
function handleTap(x, y) {
  mimes.forEach(m => {
    if (Math.abs(x - m.x) < 50 && Math.abs(y - (m.y - 40)) < 70) {
      m.bounce = 1;
    }
  });
}
canvas.addEventListener('click', e => {
  const r = canvas.getBoundingClientRect();
  handleTap(e.clientX - r.left, e.clientY - r.top);
});
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const r = canvas.getBoundingClientRect();
  const t = e.touches[0];
  handleTap(t.clientX - r.left, t.clientY - r.top);
});

// === MOOD BUTTONS ===
document.querySelectorAll('.mood-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentMood = btn.dataset.mood;
  });
});

// === LOOP ===
let lastTime = 0;
function loop(ts) {
  const dt = ts - lastTime; lastTime = ts;
  ctx.clearRect(0, 0, W, H);
  drawFloor();
  updateBlink(dt);
  mimes.forEach(m => drawMime(m, ts + m.phase * 800));
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
