<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Mimes Care Corp - Preview</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: linear-gradient(180deg, #E8EAF6 0%, #FCE4EC 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    font-family: Arial, sans-serif;
    overflow-x: hidden;
  }
  h1 {
    color: #5C6BC0;
    font-size: 22px;
    margin-top: 14px;
    text-shadow: 0 1px 2px rgba(255,255,255,0.8);
  }
  .subtitle { color: #9E9E9E; font-size: 12px; margin-top: 2px; }
  canvas { margin-top: 6px; touch-action: none; }
  .labels {
    display: flex; width: 100%; max-width: 420px;
    justify-content: space-around; margin-top: 4px;
  }
  .label {
    font-size: 13px; font-weight: bold;
    text-shadow: 0 1px 2px rgba(255,255,255,0.8);
    text-align: center;
  }
  .label small { display: block; font-weight: normal; font-size: 10px; color: #999; margin-top: 1px; }
  .mood-selector {
    display: flex; gap: 6px; margin-top: 10px;
    flex-wrap: wrap; justify-content: center; padding: 0 8px;
  }
  .mood-btn {
    padding: 5px 10px; border: 2px solid #C5CAE9; border-radius: 20px;
    background: white; font-size: 12px; cursor: pointer; transition: all 0.2s;
  }
  .mood-btn.active { background: #5C6BC0; color: white; border-color: #5C6BC0; }
  .hint { color: #BDBDBD; font-size: 11px; margin-top: 8px; }
</style>
</head>
<body>

<h1>Mimes Care Corp</h1>
<p class="subtitle">Preview de personalidades</p>
<canvas id="c"></canvas>
<div class="labels">
  <div class="label" style="color:#0288D1">Aventurero<small>Pelo revuelto</small></div>
  <div class="label" style="color:#7E57C2">Tranquilo<small>Pelo peinado</small></div>
  <div class="label" style="color:#EF6C00">P&iacute;caro<small>Pelo con estilo</small></div>
</div>
<div class="mood-selector">
  <button class="mood-btn active" data-mood="contento">😊 Contento</button>
  <button class="mood-btn" data-mood="euforico">🤩 Euf&oacute;rico</button>
  <button class="mood-btn" data-mood="triste">😢 Triste</button>
  <button class="mood-btn" data-mood="enfadado">😠 Enfadado</button>
  <button class="mood-btn" data-mood="dormido">😴 Dormido</button>
</div>
<p class="hint">Toca un Mime para interactuar</p>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = Math.min(window.innerWidth, 420);
const H = Math.round(W * 1.2);
canvas.width = W * 2;
canvas.height = H * 2;
canvas.style.width = W + 'px';
canvas.style.height = H + 'px';
ctx.scale(2, 2);

// === HELPERS ===
function hexRgb(h) { return { r: (h >> 16) & 255, g: (h >> 8) & 255, b: h & 255 }; }
function rgb(r, g, b, a = 1) { return `rgba(${r|0},${g|0},${b|0},${a})`; }
function col(h, a = 1) { const c = hexRgb(h); return rgb(c.r, c.g, c.b, a); }
function dk(h, n = 50) { const c = hexRgb(h); return { r: Math.max(0,c.r-n), g: Math.max(0,c.g-n), b: Math.max(0,c.b-n) }; }
function lt(h, n = 50) { const c = hexRgb(h); return { r: Math.min(255,c.r+n), g: Math.min(255,c.g+n), b: Math.min(255,c.b+n) }; }
function ell(x, y, rx, ry) { ctx.beginPath(); ctx.ellipse(x, y, Math.abs(rx), Math.abs(ry), 0, 0, Math.PI*2); ctx.fill(); }
function tri(x1,y1,x2,y2,x3,y3) { ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.lineTo(x3,y3); ctx.closePath(); ctx.fill(); }

// Draw a heart shape at (cx, cy) with given size
function drawHeart(cx, cy, size) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.beginPath();
  const s = size;
  ctx.moveTo(0, s * 0.3);
  ctx.bezierCurveTo(-s * 0.5, -s * 0.3, -s, s * 0.1, 0, s);
  ctx.moveTo(0, s * 0.3);
  ctx.bezierCurveTo(s * 0.5, -s * 0.3, s, s * 0.1, 0, s);
  ctx.fill();
  ctx.restore();
}

// === MIMES ===
const mimes = [
  { color: 0x81D4FA, personality: 'aventurero',
    x: W/4, y: H*0.62, speed: 0.7, amp: 1.4, bounce: 0, phase: 0 },
  { color: 0xB39DDB, personality: 'tranquilo',
    x: W/2, y: H*0.62, speed: 1.5, amp: 0.6, bounce: 0, phase: 1 },
  { color: 0xFFCC80, personality: 'picaro',
    x: W*3/4, y: H*0.62, speed: 0.9, amp: 1.0, bounce: 0, phase: 2 },
];

let currentMood = 'contento';
let blinkTimer = 2000, blinkState = 0;

// === DRAW MIME ===
function drawMime(m, t) {
  const c = m.color;
  const d = dk(c); const l = lt(c);
  const breathe = Math.sin(t / (600 * m.speed)) * m.amp;
  const pupilX = Math.sin(t / 1200) * 2.5;
  const earWig = Math.sin(t / (1000 * m.speed)) * 4 * m.amp;
  const handWig = Math.sin(t / (800 * m.speed)) * 6 * m.amp;
  const tailWig = Math.sin(t / (500 * m.speed)) * 12 * m.amp;
  const mood = currentMood;

  let by = 0;
  if (m.bounce > 0) {
    by = -Math.sin(m.bounce * Math.PI) * 20;
    m.bounce = Math.max(0, m.bounce - 0.025);
  }

  const S = 0.7;
  ctx.save();
  ctx.translate(m.x, m.y + by);
  ctx.scale(S, S);

  // Proportions: big head on top, smaller round body below
  const headR = 40;
  const bodyR = 32;
  const bodyY = -bodyR + 4;       // body center (near feet)
  const headY = bodyY - bodyR - headR + 24; // head overlaps body generously

  ctx.save();
  ctx.scale(1, 1 + breathe * 0.004);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.08)';
  ell(0, 10, bodyR * 0.9, 7);

  // === COLA (behind everything) ===
  ctx.save();
  ctx.translate(bodyR - 4, bodyY - 6);
  ctx.rotate(tailWig * Math.PI / 180);
  ctx.fillStyle = col(c);
  ell(12, 0, 14, 10);
  ctx.fillStyle = rgb(l.r, l.g, l.b, 0.5);
  ell(14, -2, 8, 6);
  ctx.restore();

  // === PATITAS ===
  ctx.fillStyle = rgb(d.r, d.g, d.b);
  ell(-14, 2, 13, 9);
  ell(14, 2, 13, 9);
  // Deditos
  ctx.fillStyle = col(c, 0.7);
  [-20, -14, -8].forEach(x => ell(x, -1, 3.5, 3));
  [8, 14, 20].forEach(x => ell(x, -1, 3.5, 3));

  // === BODY (smaller round ball) ===
  ctx.fillStyle = col(c);
  ell(0, bodyY, bodyR, bodyR);

  // Belly
  ctx.fillStyle = rgb(l.r, l.g, l.b, 0.75);
  ell(0, bodyY + 3, bodyR * 0.65, bodyR * 0.65);

  // === HEAD (big round ball) ===
  ctx.fillStyle = col(c);
  ell(0, headY, headR, headR);

  // Mejillas rosadas
  ctx.fillStyle = 'rgba(255,150,130,0.3)';
  ell(-28, headY + 10, 10, 7);
  ell(28, headY + 10, 10, 7);

  ctx.restore(); // breathe

  // === MANITAS CORAZON (on body sides) ===
  ctx.save();
  ctx.translate(-bodyR - 10, bodyY - 6);
  ctx.rotate((handWig - 8) * Math.PI / 180);
  ctx.fillStyle = col(c);
  drawHeart(0, -6, 12);
  ctx.restore();

  ctx.save();
  ctx.translate(bodyR + 10, bodyY - 6);
  ctx.rotate((-handWig + 8) * Math.PI / 180);
  ctx.fillStyle = col(c);
  drawHeart(0, -6, 12);
  ctx.restore();

  // === OREJAS GATITO (peeking from hair) ===
  const earBase = headY - headR + 8;

  ctx.save();
  ctx.translate(-22, earBase);
  ctx.rotate((-8 + earWig) * Math.PI / 180);
  ctx.fillStyle = col(c);
  tri(0, 6, -11, -18, 11, -18);
  ctx.fillStyle = 'rgba(255,171,145,0.5)';
  tri(0, 0, -7, -14, 7, -14);
  ctx.restore();

  ctx.save();
  ctx.translate(22, earBase);
  ctx.rotate((8 - earWig) * Math.PI / 180);
  ctx.fillStyle = col(c);
  tri(0, 6, -11, -18, 11, -18);
  ctx.fillStyle = 'rgba(255,171,145,0.5)';
  tri(0, 0, -7, -14, 7, -14);
  ctx.restore();

  // === PELO (big, fluffy, adorable) ===
  const hBase = headY - headR;
  const hCol = rgb(d.r - 40, d.g - 40, d.b - 40);
  const hLit = rgb(d.r - 15, d.g - 15, d.b - 15);

  if (m.personality === 'aventurero') {
    // Wild messy spikes everywhere - big and chaotic
    ctx.fillStyle = hCol;
    tri(-30, hBase + 20, -20, hBase - 22, -5, hBase + 12);
    tri(-16, hBase + 16, -4, hBase - 28, 10, hBase + 10);
    tri(0, hBase + 14, 14, hBase - 24, 26, hBase + 12);
    tri(10, hBase + 16, 22, hBase - 20, 34, hBase + 18);
    tri(-24, hBase + 18, -34, hBase - 10, -14, hBase + 10);
    // Extra big tufts on sides
    tri(-32, hBase + 22, -38, hBase - 4, -18, hBase + 14);
    tri(22, hBase + 14, 36, hBase - 8, 34, hBase + 20);
    // Highlight tufts
    ctx.fillStyle = hLit;
    tri(-12, hBase + 14, -2, hBase - 18, 8, hBase + 10);
    tri(4, hBase + 12, 16, hBase - 16, 24, hBase + 10);
  } else if (m.personality === 'tranquilo') {
    // Smooth, round, neat - like a bowl cut, big and soft
    ctx.fillStyle = hCol;
    ctx.beginPath();
    ctx.moveTo(-34, hBase + 22);
    ctx.quadraticCurveTo(-38, hBase - 2, -14, hBase - 16);
    ctx.quadraticCurveTo(0, hBase - 22, 14, hBase - 16);
    ctx.quadraticCurveTo(38, hBase - 2, 34, hBase + 22);
    ctx.quadraticCurveTo(18, hBase + 12, 0, hBase + 14);
    ctx.quadraticCurveTo(-18, hBase + 12, -34, hBase + 22);
    ctx.fill();
    // Soft highlight
    ctx.fillStyle = hLit;
    ctx.beginPath();
    ctx.moveTo(-24, hBase + 16);
    ctx.quadraticCurveTo(-26, hBase + 2, -8, hBase - 8);
    ctx.quadraticCurveTo(0, hBase - 12, 8, hBase - 8);
    ctx.quadraticCurveTo(26, hBase + 2, 24, hBase + 16);
    ctx.quadraticCurveTo(0, hBase + 10, -24, hBase + 16);
    ctx.fill();
    // Little swoosh
    ctx.fillStyle = hCol;
    ctx.beginPath();
    ctx.moveTo(12, hBase - 14);
    ctx.quadraticCurveTo(22, hBase - 26, 16, hBase - 10);
    ctx.fill();
  } else if (m.personality === 'picaro') {
    // Styled with big quiff to one side
    ctx.fillStyle = hCol;
    ctx.beginPath();
    ctx.moveTo(-32, hBase + 22);
    ctx.quadraticCurveTo(-36, hBase, -14, hBase - 12);
    ctx.quadraticCurveTo(0, hBase - 18, 14, hBase - 12);
    ctx.quadraticCurveTo(34, hBase - 2, 32, hBase + 22);
    ctx.quadraticCurveTo(14, hBase + 12, 0, hBase + 14);
    ctx.quadraticCurveTo(-16, hBase + 12, -32, hBase + 22);
    ctx.fill();
    // Big dramatic quiff
    ctx.fillStyle = hCol;
    tri(18, hBase - 8, 40, hBase - 34, 34, hBase);
    tri(24, hBase - 12, 44, hBase - 28, 38, hBase - 2);
    tri(14, hBase - 6, 34, hBase - 30, 28, hBase);
    // Highlight
    ctx.fillStyle = hLit;
    tri(22, hBase - 10, 38, hBase - 28, 32, hBase - 4);
    // Little curl on other side
    ctx.fillStyle = hCol;
    ctx.beginPath();
    ctx.moveTo(-22, hBase + 4);
    ctx.quadraticCurveTo(-34, hBase - 14, -18, hBase + 2);
    ctx.fill();
  }

  // === OJOS (big, on head) ===
  const eyeY = headY - 2;
  const eyeSp = 18;
  const eyeRX = 14, eyeRY = 16;

  if (mood === 'dormido') {
    ctx.strokeStyle = '#444';
    ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.arc(-eyeSp, eyeY, 10, 0.2, Math.PI - 0.2); ctx.stroke();
    ctx.beginPath(); ctx.arc(eyeSp, eyeY, 10, 0.2, Math.PI - 0.2); ctx.stroke();
    ctx.fillStyle = '#9E9E9E';
    ctx.font = 'bold 14px Arial';
    ctx.fillText('z', 34, headY - 32 + Math.sin(t/500)*4);
    ctx.font = 'bold 18px Arial';
    ctx.fillText('Z', 42, headY - 48 + Math.sin(t/500+1)*4);
  } else {
    const eyeOff = mood === 'triste' ? 3 : 0;

    // Whites
    ctx.fillStyle = '#fff';
    ell(-eyeSp, eyeY + eyeOff, eyeRX, eyeRY);
    ell(eyeSp, eyeY + eyeOff, eyeRX, eyeRY);

    // Outline
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.ellipse(-eyeSp, eyeY + eyeOff, eyeRX, eyeRY, 0, 0, Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.ellipse(eyeSp, eyeY + eyeOff, eyeRX, eyeRY, 0, 0, Math.PI*2); ctx.stroke();

    if (blinkState < 2) {
      const pR = mood === 'euforico' ? 10 : mood === 'enfadado' ? 6 : 8;
      ctx.fillStyle = '#1a1a2e';
      ell(-eyeSp + pupilX, eyeY + eyeOff + 1, pR, pR + 1);
      ell(eyeSp + pupilX, eyeY + eyeOff + 1, pR, pR + 1);
      // Shine
      ctx.fillStyle = '#fff';
      ell(-eyeSp + pupilX + 4, eyeY + eyeOff - 3, 3.5, 3.5);
      ell(eyeSp + pupilX + 4, eyeY + eyeOff - 3, 3.5, 3.5);
      ell(-eyeSp + pupilX - 2, eyeY + eyeOff + 3, 1.8, 1.8);
      ell(eyeSp + pupilX - 2, eyeY + eyeOff + 3, 1.8, 1.8);
    }

    if (blinkState >= 2) {
      ctx.fillStyle = col(c);
      ell(-eyeSp, eyeY + eyeOff, eyeRX + 1, eyeRY + 1);
      ell(eyeSp, eyeY + eyeOff, eyeRX + 1, eyeRY + 1);
    }

    // Eyebrows
    if (mood === 'enfadado') {
      ctx.strokeStyle = '#333'; ctx.lineWidth = 3.5;
      ctx.beginPath(); ctx.moveTo(-eyeSp - 14, eyeY - 20); ctx.lineTo(-eyeSp + 6, eyeY - 16); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(eyeSp + 14, eyeY - 20); ctx.lineTo(eyeSp - 6, eyeY - 16); ctx.stroke();
    } else if (mood === 'triste') {
      ctx.strokeStyle = rgb(d.r, d.g, d.b, 0.6); ctx.lineWidth = 2.5;
      ctx.beginPath(); ctx.moveTo(-eyeSp - 12, eyeY - 16); ctx.lineTo(-eyeSp + 8, eyeY - 20); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(eyeSp + 12, eyeY - 16); ctx.lineTo(eyeSp - 8, eyeY - 20); ctx.stroke();
    } else {
      ctx.strokeStyle = rgb(d.r, d.g, d.b, 0.4); ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(-eyeSp, eyeY - 14, 12, Math.PI + 0.4, -0.4); ctx.stroke();
      ctx.beginPath(); ctx.arc(eyeSp, eyeY - 14, 12, Math.PI + 0.4, -0.4); ctx.stroke();
    }
  }

  // === NARIZ ===
  ctx.fillStyle = 'rgba(255,150,130,0.9)';
  tri(0, headY + 6, -4, headY + 12, 4, headY + 12);

  // === BOCA (expressive) ===
  const mY = headY + 18;

  if (mood === 'euforico') {
    ctx.fillStyle = '#333';
    ctx.beginPath();
    ctx.moveTo(-18, mY - 2);
    ctx.quadraticCurveTo(0, mY + 24, 18, mY - 2);
    ctx.quadraticCurveTo(0, mY + 28, -18, mY - 2);
    ctx.fill();
    ctx.fillStyle = '#E53935';
    ell(0, mY + 14, 7, 5);
    ctx.strokeStyle = '#333'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(-18, mY - 2); ctx.lineTo(-22, mY - 5); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(18, mY - 2); ctx.lineTo(22, mY - 5); ctx.stroke();
  } else if (mood === 'contento') {
    ctx.strokeStyle = '#333'; ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(-16, mY);
    ctx.quadraticCurveTo(0, mY + 18, 16, mY);
    ctx.stroke();
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(-16, mY); ctx.lineTo(-20, mY - 3); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(16, mY); ctx.lineTo(20, mY - 3); ctx.stroke();
  } else if (mood === 'triste') {
    ctx.strokeStyle = '#555'; ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(-12, mY + 8);
    ctx.quadraticCurveTo(0, mY - 4, 12, mY + 8);
    ctx.stroke();
  } else if (mood === 'enfadado') {
    ctx.strokeStyle = '#333'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(-12, mY + 2); ctx.lineTo(12, mY + 3); ctx.stroke();
  } else if (mood === 'dormido') {
    ctx.fillStyle = '#555';
    ell(0, mY + 4, 5, 4);
  }

  ctx.restore();
}

// === FLOOR ===
function drawFloor() {
  ctx.fillStyle = 'rgba(188,170,164,0.25)';
  ctx.fillRect(0, H - 55, W, 55);
  ctx.fillStyle = 'rgba(200,190,180,0.2)';
  ctx.fillRect(0, H - 55, W, 2);
}

// === BLINK ===
function updateBlink(dt) {
  blinkTimer -= dt;
  if (blinkTimer <= 0) {
    if (blinkState === 0) { blinkState = 1; blinkTimer = 60; }
    else if (blinkState === 1) { blinkState = 2; blinkTimer = 80; }
    else if (blinkState === 2) { blinkState = 3; blinkTimer = 60; }
    else { blinkState = 0; blinkTimer = 2500 + Math.random() * 2000; }
  }
}

// === INTERACTION ===
function handleTap(x, y) {
  mimes.forEach(m => {
    if (Math.abs(x - m.x) < 50 && Math.abs(y - (m.y - 40)) < 70) {
      m.bounce = 1;
    }
  });
}
canvas.addEventListener('click', e => {
  const r = canvas.getBoundingClientRect();
  handleTap(e.clientX - r.left, e.clientY - r.top);
});
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const r = canvas.getBoundingClientRect();
  const t = e.touches[0];
  handleTap(t.clientX - r.left, t.clientY - r.top);
});

// === MOOD BUTTONS ===
document.querySelectorAll('.mood-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentMood = btn.dataset.mood;
  });
});

// === LOOP ===
let lastTime = 0;
function loop(ts) {
  const dt = ts - lastTime; lastTime = ts;
  ctx.clearRect(0, 0, W, H);
  drawFloor();
  updateBlink(dt);
  mimes.forEach(m => drawMime(m, ts + m.phase * 800));
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
