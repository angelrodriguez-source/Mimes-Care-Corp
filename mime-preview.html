<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mimes Care Corp - Preview</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: #fefce8;
        background-image:
            radial-gradient(ellipse at 20% 80%, #fde68a33 0%, transparent 50%),
            radial-gradient(ellipse at 80% 20%, #bfdbfe22 0%, transparent 50%);
        font-family: 'Baloo 2', cursive;
        overflow: hidden;
        user-select: none;
    }

    .particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .particle {
        position: absolute; border-radius: 50%; opacity: 0.15;
        animation: float-particle linear infinite;
    }
    @keyframes float-particle {
        0% { transform: translateY(100vh) scale(0); opacity: 0; }
        10% { opacity: 0.15; } 90% { opacity: 0.15; }
        100% { transform: translateY(-10vh) scale(1); opacity: 0; }
    }

    .page-title {
        font-size: 28px; font-weight: 700; color: #5C6BC0;
        margin-bottom: 4px; z-index: 1;
        text-shadow: 0 2px 4px rgba(255,255,255,0.8);
        animation: fade-up 0.6s ease both;
    }
    .page-subtitle { font-size: 14px; color: #9E9E9E; margin-bottom: 12px; z-index: 1; }

    /* === 3 MIMES ROW === */
    .mimes-row {
        display: flex;
        justify-content: center;
        gap: 8px;
        z-index: 1;
        animation: scene-enter 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
    @keyframes scene-enter {
        from { opacity: 0; transform: translateY(40px) scale(0.9); }
        to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .mime-wrapper {
        display: flex; flex-direction: column; align-items: center;
    }

    /* === MOOD SELECTOR === */
    .mood-selector {
        display: flex; gap: 6px; margin-top: 14px; flex-wrap: wrap;
        justify-content: center; padding: 0 8px; z-index: 1;
    }
    .mood-btn {
        padding: 5px 12px; border: 2px solid #C5CAE9; border-radius: 20px;
        background: white; font-size: 13px; cursor: pointer; transition: all 0.2s;
        font-family: 'Baloo 2', cursive;
    }
    .mood-btn.active { background: #5C6BC0; color: white; border-color: #5C6BC0; }

    /* === CHARACTER (scaled down for 3) === */
    .scene {
        position: relative;
        display: flex; flex-direction: column; align-items: center;
    }
    .ground-shadow {
        width: 100px; height: 10px;
        background: rgba(26,26,46,0.12);
        border-radius: 50%; margin-top: -6px;
        filter: blur(5px);
        animation: shadow-breathe 3s ease-in-out infinite;
    }
    @keyframes shadow-breathe {
        0%, 100% { transform: scaleX(1); opacity: 0.5; }
        50% { transform: scaleX(1.08); opacity: 0.35; }
    }

    .character {
        position: relative;
        width: 150px; height: 180px;
        cursor: pointer;
        animation: breathe 3s ease-in-out infinite;
    }
    @keyframes breathe {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-4px); }
    }

    .body {
        position: absolute; bottom: 26px; left: 50%;
        transform: translateX(-50%);
        width: 120px; height: 132px;
        background: var(--body-color);
        border-radius: 50% 50% 45% 45%;
        overflow: hidden;
        box-shadow: inset -8px -6px 16px rgba(255,255,255,0.04), 0 4px 16px rgba(26,26,46,0.12);
    }
    .belly {
        position: absolute; bottom: -10px; left: 50%;
        transform: translateX(-50%);
        width: 100px; height: 112px;
        background: var(--belly-color);
        border-radius: 50%;
        box-shadow: inset 0 -6px 12px rgba(251,191,36,0.08);
    }

    /* Ears */
    .ear {
        position: absolute; top: 12px;
        width: 30px; height: 30px;
        background: var(--body-color); z-index: 1;
        transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .ear.left { left: 22px; border-radius: 5px 20px 5px 5px; transform: rotate(-15deg); }
    .ear.right { right: 22px; border-radius: 20px 5px 5px 5px; transform: rotate(15deg); }
    .ear::after {
        content: ''; position: absolute; top: 5px; left: 50%;
        transform: translateX(-50%);
        width: 15px; height: 15px;
        background: var(--ear-inner); border-radius: inherit; opacity: 0.4;
    }
    .character:hover .ear.left { transform: rotate(-25deg) translateY(-3px); }
    .character:hover .ear.right { transform: rotate(25deg) translateY(-3px); }

    /* Hair / Fur on top */
    .hair {
        position: absolute; top: 0; left: 50%; transform: translateX(-50%);
        z-index: 2; pointer-events: none;
    }
    .hair-tuft {
        position: absolute;
        background: var(--hair-color);
        box-shadow: inset -2px -2px 4px rgba(0,0,0,0.15), inset 2px 2px 4px rgba(255,255,255,0.1);
    }
    .hair-highlight {
        position: absolute;
        background: var(--hair-highlight);
        border-radius: 50%;
        opacity: 0.3;
    }

    /* Aventurero: wild messy big hair */
    .aventurero .hair { width: 120px; height: 50px; top: -14px; }
    .aventurero .hair-tuft:nth-child(1) {
        width: 22px; height: 38px; left: 6px; top: 12px;
        border-radius: 60% 40% 30% 30%;
        transform: rotate(-30deg);
    }
    .aventurero .hair-tuft:nth-child(2) {
        width: 20px; height: 44px; left: 22px; top: 2px;
        border-radius: 50% 50% 25% 25%;
        transform: rotate(-14deg);
    }
    .aventurero .hair-tuft:nth-child(3) {
        width: 22px; height: 46px; left: 40px; top: -2px;
        border-radius: 50% 50% 30% 30%;
        transform: rotate(4deg);
    }
    .aventurero .hair-tuft:nth-child(4) {
        width: 20px; height: 42px; left: 56px; top: 0px;
        border-radius: 50% 50% 25% 25%;
        transform: rotate(16deg);
    }
    .aventurero .hair-tuft:nth-child(5) {
        width: 18px; height: 36px; left: 70px; top: 6px;
        border-radius: 50% 50% 30% 30%;
        transform: rotate(28deg);
    }
    .aventurero .hair-tuft:nth-child(6) {
        width: 16px; height: 30px; left: 82px; top: 12px;
        border-radius: 50% 50% 30% 30%;
        transform: rotate(40deg);
    }
    .aventurero .hair-tuft:nth-child(7) {
        width: 18px; height: 32px; left: -2px; top: 18px;
        border-radius: 50% 50% 30% 30%;
        transform: rotate(-40deg);
    }
    .aventurero .hair-highlight {
        width: 40px; height: 14px; left: 30px; top: 6px;
        transform: rotate(-8deg);
    }

    /* Tranquilo: smooth fluffy dome */
    .tranquilo .hair { width: 120px; height: 42px; top: -8px; }
    .tranquilo .hair-tuft:nth-child(1) {
        width: 110px; height: 36px; left: 5px; top: 4px;
        border-radius: 50% 50% 42% 42%;
    }
    .tranquilo .hair-tuft:nth-child(2) {
        width: 90px; height: 28px; left: 15px; top: 6px;
        border-radius: 50%;
        background: var(--hair-highlight);
        opacity: 0.2;
    }
    .tranquilo .hair-tuft:nth-child(3) {
        width: 24px; height: 18px; left: 74px; top: 0px;
        border-radius: 50% 60% 30% 30%;
        transform: rotate(12deg);
    }

    /* Picaro: big styled quiff */
    .picaro .hair { width: 130px; height: 55px; top: -16px; }
    .picaro .hair-tuft:nth-child(1) {
        width: 100px; height: 30px; left: 6px; top: 20px;
        border-radius: 50% 50% 42% 42%;
    }
    .picaro .hair-tuft:nth-child(2) {
        width: 28px; height: 46px; left: 68px; top: -4px;
        border-radius: 55% 45% 25% 30%;
        transform: rotate(18deg);
    }
    .picaro .hair-tuft:nth-child(3) {
        width: 22px; height: 40px; left: 82px; top: 0px;
        border-radius: 50% 50% 25% 25%;
        transform: rotate(28deg);
    }
    .picaro .hair-tuft:nth-child(4) {
        width: 18px; height: 34px; left: 92px; top: 8px;
        border-radius: 50% 50% 30% 30%;
        transform: rotate(38deg);
    }
    .picaro .hair-tuft:nth-child(5) {
        width: 20px; height: 28px; left: 2px; top: 16px;
        border-radius: 50% 50% 30% 30%;
        transform: rotate(-22deg);
    }
    .picaro .hair-highlight {
        width: 30px; height: 12px; left: 70px; top: 8px;
        transform: rotate(20deg);
    }

    /* Collar */
    .collar {
        position: absolute; top: 78px; left: 50%;
        transform: translateX(-50%);
        width: 100px; height: 18px;
        background: var(--collar-color);
        border-radius: 50px; z-index: 10;
        box-shadow: 0 2px 0 rgba(0,0,0,0.04), inset 0 -2px 4px rgba(0,0,0,0.03);
    }

    /* Eyes */
    .eye {
        position: absolute; top: 40px;
        width: 40px; height: 50px;
        background: white; border-radius: 50%;
        z-index: 5; border: 1.5px solid #0f0f1a;
        overflow: hidden;
        box-shadow: inset 0 -2px 4px rgba(0,0,0,0.04);
    }
    .eye.left { left: 31px; }
    .eye.right { right: 31px; }

    .pupil {
        position: absolute; top: 14px; left: 50%;
        transform: translateX(-50%);
        width: 24px; height: 28px;
        background: #0f0f1a; border-radius: 50%;
        transition: transform 0.15s ease-out;
    }
    .pupil::before {
        content: ''; position: absolute; top: 4px; right: 3px;
        width: 8px; height: 8px;
        background: white; border-radius: 50%;
        animation: sparkle 2.5s ease-in-out infinite;
    }
    .pupil::after {
        content: ''; position: absolute; top: 14px; right: 5px;
        width: 4px; height: 4px;
        background: rgba(255,255,255,0.6); border-radius: 50%;
    }
    @keyframes sparkle {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.15); opacity: 0.8; }
    }

    .eye-lid {
        position: absolute; top: -1px; left: -1px; right: -1px;
        height: 0%; background: var(--body-color);
        z-index: 6; border-radius: 50% 50% 0 0;
        animation: blink 4s ease-in-out infinite;
    }
    @keyframes blink {
        0%, 95%, 100% { height: 0%; }
        97% { height: 100%; }
    }

    /* Blush */
    .blush {
        position: absolute; top: 72px;
        width: 18px; height: 10px;
        background: #fca5a5; border-radius: 50%;
        z-index: 8; opacity: 0.5; filter: blur(2px);
        transition: opacity 0.4s;
    }
    .blush.left { left: 26px; }
    .blush.right { right: 26px; }
    .character:hover .blush { opacity: 0.8; }

    /* Mouth - cute cat style */
    .mouth {
        position: absolute; top: 80px; left: 50%;
        transform: translateX(-50%);
        width: 36px; height: 22px; z-index: 15;
        transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    /* Cat nose */
    .mouth-nose {
        position: absolute; top: -4px; left: 50%;
        transform: translateX(-50%);
        width: 9px; height: 7px;
        background: #f48fb1;
        border-radius: 50% 50% 40% 40%;
        z-index: 5;
        box-shadow: 0 1px 2px rgba(0,0,0,0.1);
    }
    /* Dark interior - visible when mouth opens */
    .mouth-interior {
        position: absolute; top: 5px; left: 50%;
        transform: translateX(-50%);
        width: 0px; height: 0px;
        background: #2a1a1a;
        border-radius: 50%;
        z-index: 1;
        transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    /* "w" shaped cat mouth using two curves */
    .mouth-line {
        position: absolute; top: 3px; left: 0;
        width: 36px; height: 18px;
        z-index: 3;
    }
    .mouth-curve-left, .mouth-curve-right {
        position: absolute; top: 0;
        width: 18px; height: 14px;
        border: 2.5px solid #4a4a4a;
        border-top: none;
        border-radius: 0 0 50% 50%;
        background: transparent;
        transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .mouth-curve-left { left: 0; border-right: none; border-radius: 0 0 0 60%; }
    .mouth-curve-right { right: 0; border-left: none; border-radius: 0 0 60% 0; }
    /* Tongue - inside mouth-line so it follows the curves */
    .mouth-tongue {
        position: absolute; bottom: -2px; left: 50%;
        transform: translateX(-50%);
        width: 10px; height: 0px;
        background: #f48fb1;
        border-radius: 0 0 50% 50%;
        z-index: 4;
        transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    /* Gentle idle mouth animation */
    .mouth-curve-left, .mouth-curve-right {
        animation: cat-idle 5s ease-in-out infinite;
    }
    @keyframes cat-idle {
        0%, 100% { transform: scaleY(1) scaleX(1); }
        30% { transform: scaleY(1.08) scaleX(1.03); }
        60% { transform: scaleY(0.95) scaleX(0.98); }
    }

    /* === MOOD EXPRESSIONS === */

    /* Happy: bigger smile, dark interior, tongue peeking */
    .mood-feliz .mouth { width: 42px; height: 26px; }
    .mood-feliz .mouth-line { width: 42px; height: 22px; }
    .mood-feliz .mouth-curve-left { width: 21px; height: 18px; border-width: 3px; }
    .mood-feliz .mouth-curve-right { width: 21px; height: 18px; border-width: 3px; }
    .mood-feliz .mouth-interior { width: 24px; height: 12px; top: 6px; }
    .mood-feliz .mouth-tongue { height: 7px; bottom: -3px; }
    .mood-feliz .mouth-curve-left, .mood-feliz .mouth-curve-right {
        animation: cat-happy 3s ease-in-out infinite;
    }
    .mood-feliz .mouth-interior {
        animation: interior-happy 3s ease-in-out infinite;
    }
    @keyframes cat-happy {
        0%, 100% { transform: scaleY(1) scaleX(1); }
        25% { transform: scaleY(1.12) scaleX(1.06); }
        50% { transform: scaleY(1) scaleX(1); }
        75% { transform: scaleY(1.08) scaleX(1.04); }
    }
    @keyframes interior-happy {
        0%, 100% { transform: translateX(-50%) scaleY(1); }
        25% { transform: translateX(-50%) scaleY(1.15); }
        50% { transform: translateX(-50%) scaleY(1); }
        75% { transform: translateX(-50%) scaleY(1.1); }
    }

    /* Sad: inverted curves (frown), no interior */
    .mood-triste .mouth { width: 26px; height: 16px; }
    .mood-triste .mouth-line { width: 26px; }
    .mood-triste .mouth-interior { width: 0; height: 0; }
    .mood-triste .mouth-curve-left {
        width: 13px; height: 10px;
        border: 2.5px solid #4a4a4a;
        border-bottom: none; border-right: none;
        border-radius: 60% 0 0 0;
        animation: cat-sad 4s ease-in-out infinite;
    }
    .mood-triste .mouth-curve-right {
        width: 13px; height: 10px;
        border: 2.5px solid #4a4a4a;
        border-bottom: none; border-left: none;
        border-radius: 0 60% 0 0;
        animation: cat-sad 4s ease-in-out infinite;
    }
    @keyframes cat-sad {
        0%, 100% { transform: scaleY(1); }
        50% { transform: scaleY(1.12) translateY(-1px); }
    }
    .mood-triste .mouth-tongue { height: 0; }
    .mood-triste .blush { opacity: 0.2 !important; }

    /* Euphoric: huge open mouth, big dark interior, tongue out */
    .mood-euforico .mouth { width: 48px; height: 32px; }
    .mood-euforico .mouth-line { width: 48px; height: 26px; }
    .mood-euforico .mouth-curve-left { width: 24px; height: 22px; border-width: 3px; }
    .mood-euforico .mouth-curve-right { width: 24px; height: 22px; border-width: 3px; }
    .mood-euforico .mouth-interior { width: 32px; height: 18px; top: 6px; }
    .mood-euforico .mouth-tongue { height: 11px; width: 14px; bottom: -6px; }
    .mood-euforico .mouth-curve-left, .mood-euforico .mouth-curve-right {
        animation: cat-euphoric 2.5s ease-in-out infinite;
    }
    .mood-euforico .mouth-interior {
        animation: interior-euphoric 2.5s ease-in-out infinite;
    }
    .mood-euforico .mouth-tongue {
        animation: tongue-bounce 2s ease-in-out infinite;
    }
    @keyframes cat-euphoric {
        0%, 100% { transform: scaleY(1) scaleX(1); }
        20% { transform: scaleY(1.2) scaleX(1.08); }
        40% { transform: scaleY(0.92) scaleX(0.96); }
        60% { transform: scaleY(1.15) scaleX(1.06); }
        80% { transform: scaleY(0.96) scaleX(1); }
    }
    @keyframes interior-euphoric {
        0%, 100% { transform: translateX(-50%) scale(1); }
        20% { transform: translateX(-50%) scale(1.15); }
        40% { transform: translateX(-50%) scale(0.9); }
        60% { transform: translateX(-50%) scale(1.12); }
        80% { transform: translateX(-50%) scale(0.95); }
    }
    @keyframes tongue-bounce {
        0%, 100% { transform: translateX(-50%) scaleY(1); }
        50% { transform: translateX(-50%) scaleY(1.15) translateY(1px); }
    }
    .mood-euforico .blush { opacity: 0.9 !important; }

    /* Sleepy: tiny "o" mouth with small dark circle */
    .mood-dormido .mouth { width: 16px; height: 16px; }
    .mood-dormido .mouth-nose { top: -4px; }
    .mood-dormido .mouth-line { width: 16px; height: 12px; }
    .mood-dormido .mouth-interior { width: 8px; height: 8px; top: 5px; border-radius: 50%; }
    .mood-dormido .mouth-curve-left {
        width: 8px; height: 10px;
        border-radius: 0 0 0 50%;
        animation: cat-sleepy 5s ease-in-out infinite;
    }
    .mood-dormido .mouth-curve-right {
        width: 8px; height: 10px;
        border-radius: 0 0 50% 0;
        animation: cat-sleepy 5s ease-in-out infinite;
    }
    .mood-dormido .mouth-interior {
        animation: interior-sleepy 5s ease-in-out infinite;
    }
    @keyframes cat-sleepy {
        0%, 100% { transform: scaleY(1); }
        50% { transform: scaleY(0.85); }
    }
    @keyframes interior-sleepy {
        0%, 100% { transform: translateX(-50%) scale(1); }
        50% { transform: translateX(-50%) scale(0.8); }
    }
    .mood-dormido .mouth-tongue { height: 0; }
    .mood-dormido .eye-lid {
        animation: sleepy-eyes 5s ease-in-out infinite !important;
    }
    @keyframes sleepy-eyes {
        0%, 30%, 100% { height: 70%; }
        15% { height: 100%; }
    }

    /* Hungry: licking lips, dark interior, tongue sweeps */
    .mood-hambriento .mouth { width: 40px; height: 24px; }
    .mood-hambriento .mouth-line { width: 40px; height: 20px; }
    .mood-hambriento .mouth-curve-left { width: 20px; height: 16px; }
    .mood-hambriento .mouth-curve-right { width: 20px; height: 16px; }
    .mood-hambriento .mouth-interior { width: 22px; height: 10px; top: 6px; }
    .mood-hambriento .mouth-tongue {
        height: 9px; width: 12px; bottom: -4px;
        animation: tongue-lick 4s ease-in-out infinite;
    }
    @keyframes tongue-lick {
        0%, 50%, 100% { transform: translateX(-50%); height: 0px; }
        15% { transform: translateX(-20%); height: 9px; }
        25% { transform: translateX(-80%); height: 9px; }
        40% { transform: translateX(-50%); height: 4px; }
    }
    .mood-hambriento .mouth-curve-left, .mood-hambriento .mouth-curve-right {
        animation: cat-hungry 4s ease-in-out infinite;
    }
    .mood-hambriento .mouth-interior {
        animation: interior-hungry 4s ease-in-out infinite;
    }
    @keyframes cat-hungry {
        0%, 50%, 100% { transform: scaleY(1); }
        15%, 25% { transform: scaleY(1.15) scaleX(1.08); }
    }
    @keyframes interior-hungry {
        0%, 50%, 100% { transform: translateX(-50%) scale(1); }
        15%, 25% { transform: translateX(-50%) scale(1.2); }
    }

    /* ===== HEART HANDS (dark, body color) ===== */
    .hand {
        position: absolute;
        top: 96px;
        z-index: 20;
        font-size: 38px;
        line-height: 1;
        cursor: pointer;
        color: var(--body-color);
    }
    .hand.left {
        left: -8px;
        animation: wave-left 2.8s ease-in-out infinite;
        transform-origin: right center;
    }
    .hand.right {
        right: -8px;
        animation: wave-right 2.8s ease-in-out infinite;
        transform-origin: left center;
    }
    @keyframes wave-left {
        0%, 100% { transform: rotate(0deg); }
        20% { transform: rotate(-20deg); }
        40% { transform: rotate(10deg); }
        60% { transform: rotate(-15deg); }
        80% { transform: rotate(5deg); }
    }
    @keyframes wave-right {
        0%, 100% { transform: rotate(0deg); }
        15% { transform: rotate(20deg); }
        35% { transform: rotate(-10deg); }
        55% { transform: rotate(15deg); }
        75% { transform: rotate(-5deg); }
    }
    .character:hover .hand.left {
        animation: wave-left-fast 0.5s ease-in-out infinite;
    }
    .character:hover .hand.right {
        animation: wave-right-fast 0.5s ease-in-out infinite;
    }
    @keyframes wave-left-fast {
        0%, 100% { transform: rotate(0deg); }
        50% { transform: rotate(-30deg) translateY(-6px); }
    }
    @keyframes wave-right-fast {
        0%, 100% { transform: rotate(0deg); }
        50% { transform: rotate(30deg) translateY(-6px); }
    }

    /* Feet */
    .foot {
        position: absolute; bottom: 16px;
        width: 32px; height: 20px;
        background: var(--feet-color);
        border-radius: 12px 12px 6px 6px;
        border: 1.5px solid #b45309;
        box-shadow: inset 0 -2px 3px rgba(180,83,9,0.12), 0 1px 2px rgba(26,26,46,0.12);
    }
    .foot.left { left: 38px; }
    .foot.right { right: 38px; }
    .foot::before {
        content: ''; position: absolute; top: 4px; left: 50%;
        transform: translateX(-50%);
        width: 16px; height: 10px;
        border-left: 1.5px solid rgba(180,83,9,0.2);
        border-right: 1.5px solid rgba(180,83,9,0.2);
    }



    /* Heart burst on click */
    .heart-burst { position: absolute; pointer-events: none; z-index: 100; }
    .mini-heart {
        position: absolute; font-size: 14px;
        animation: heart-fly 1s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        opacity: 0;
    }
    @keyframes heart-fly {
        0% { transform: translate(0, 0) scale(0) rotate(0deg); opacity: 1; }
        60% { opacity: 1; }
        100% { transform: translate(var(--tx), var(--ty)) scale(1.2) rotate(var(--rot)); opacity: 0; }
    }

    .mime-label {
        margin-top: 8px; font-size: 15px; font-weight: 700;
        letter-spacing: 0.5px;

        animation: fade-up 0.6s 0.5s ease both;

    .mime-sublabel {

    @keyframes fade-up {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .hint {
        color: #BDBDBD; font-size: 12px; margin-top: 14px; z-index: 1;

</style>

<script>
// Eye tracking
document.addEventListener('mousemove', track);
document.addEventListener('touchmove', e => {
  const t = e.touches[0];
  track({ clientX: t.clientX, clientY: t.clientY });
});

function track(e) {
  document.querySelectorAll('.character').forEach(ch => {
    const rect = ch.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height * 0.3;
    const dx = e.clientX - cx;
    const dy = e.clientY - cy;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const max = 5;
    const mx = (dx / dist) * Math.min(dist * 0.02, max);
    const my = (dy / dist) * Math.min(dist * 0.02, max);
    ch.querySelectorAll('.pupil').forEach(p => {
      p.style.transform = `translate(calc(-50% + ${mx}px), ${my}px)`;
    });
  });
}

// Click interaction
const phrases = ['¡Hola! 🐾','Miau~ 💕','¡Te quiero!','Noot noot! 🐧','*purrs* ✨','¡Abrazo! 🤗','Nya~ 🎀','♪ ♫ ♪'];
let idx = 0;

document.querySelectorAll('.character').forEach(ch => {
  ch.addEventListener('click', e => {
    const burst = document.createElement('div');
    burst.className = 'heart-burst';
    const rect = ch.getBoundingClientRect();
    burst.style.left = (e.clientX - rect.left) + 'px';
    burst.style.top = (e.clientY - rect.top) + 'px';

    const hearts = ['❤️','💛','💖','🧡','💜','💗'];
    for (let i = 0; i < 6; i++) {
      const h = document.createElement('div');
      h.className = 'mini-heart';
      h.textContent = hearts[i];
      const a = (Math.PI * 2 / 6) * i + (Math.random() - 0.5);
      const r = 30 + Math.random() * 25;
      h.style.setProperty('--tx', `${Math.cos(a)*r}px`);
      h.style.setProperty('--ty', `${Math.sin(a)*r - 20}px`);
      h.style.setProperty('--rot', `${(Math.random()-0.5)*60}deg`);
      h.style.animationDelay = `${i*0.05}s`;
      burst.appendChild(h);
    }
    ch.appendChild(burst);
    setTimeout(() => burst.remove(), 1200);
  });
});

// Mood selector
const moodBtns = document.querySelectorAll('.mood-btn');
const allMoods = ['mood-feliz','mood-triste','mood-euforico','mood-dormido','mood-hambriento'];

moodBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    moodBtns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const mood = btn.dataset.mood;
    document.querySelectorAll('.character').forEach(ch => {
      allMoods.forEach(m => ch.classList.remove(m));
      if (mood) ch.classList.add(mood);
    });
  });
});

// Particles
const particlesEl = document.getElementById('particles');
const colors = ['#fbbf24','#fca5a5','#a5b4fc','#86efac','#fde68a'];
for (let i = 0; i < 15; i++) {
  const p = document.createElement('div');
  p.className = 'particle';
  const s = 4 + Math.random() * 8;
  p.style.width = s + 'px'; p.style.height = s + 'px';
  p.style.left = Math.random() * 100 + '%';
  p.style.background = colors[Math.floor(Math.random() * colors.length)];
  p.style.animationDuration = (8 + Math.random() * 12) + 's';
  p.style.animationDelay = (Math.random() * 10) + 's';
  particlesEl.appendChild(p);
}
</script>
