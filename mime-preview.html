<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Mimes Care Corp - Preview</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: linear-gradient(180deg, #F5F5DC 0%, #FFF8E7 100%);
    display: flex; flex-direction: column; align-items: center;
    min-height: 100vh; font-family: Arial, sans-serif; overflow-x: hidden;
  }
  h1 { color: #5C6BC0; font-size: 22px; margin-top: 14px; text-shadow: 0 1px 2px rgba(255,255,255,0.8); }
  .subtitle { color: #9E9E9E; font-size: 12px; margin-top: 2px; }
  canvas { margin-top: 6px; touch-action: none; }
  .labels { display: flex; width: 100%; max-width: 420px; justify-content: space-around; margin-top: 4px; }
  .label { font-size: 13px; font-weight: bold; text-shadow: 0 1px 2px rgba(255,255,255,0.8); text-align: center; }
  .label small { display: block; font-weight: normal; font-size: 10px; color: #999; margin-top: 1px; }
  .mood-selector { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; justify-content: center; padding: 0 8px; }
  .mood-btn { padding: 5px 10px; border: 2px solid #C5CAE9; border-radius: 20px; background: white; font-size: 12px; cursor: pointer; transition: all 0.2s; }
  .mood-btn.active { background: #5C6BC0; color: white; border-color: #5C6BC0; }
  .hint { color: #BDBDBD; font-size: 11px; margin-top: 8px; }
</style>
</head>
<body>
<h1>Mimes Care Corp</h1>
<p class="subtitle">Preview de personalidades</p>
<canvas id="c"></canvas>
<div class="labels">
  <div class="label" style="color:#0288D1">Aventurero<small>Pelo revuelto</small></div>
  <div class="label" style="color:#7E57C2">Tranquilo<small>Pelo peinado</small></div>
  <div class="label" style="color:#EF6C00">P&iacute;caro<small>Pelo con estilo</small></div>
</div>
<div class="mood-selector">
  <button class="mood-btn active" data-mood="contento">😊 Contento</button>
  <button class="mood-btn" data-mood="euforico">🤩 Euf&oacute;rico</button>
  <button class="mood-btn" data-mood="triste">😢 Triste</button>
  <button class="mood-btn" data-mood="enfadado">😠 Enfadado</button>
  <button class="mood-btn" data-mood="dormido">😴 Dormido</button>
</div>
<p class="hint">Toca un Mime para interactuar</p>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = Math.min(window.innerWidth, 420);
const H = Math.round(W * 1.25);
canvas.width = W * 2; canvas.height = H * 2;
canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
ctx.scale(2, 2);

function hexRgb(h){return{r:(h>>16)&255,g:(h>>8)&255,b:h&255}}
function rgb(r,g,b,a=1){return`rgba(${r|0},${g|0},${b|0},${a})`}
function col(h,a=1){const c=hexRgb(h);return rgb(c.r,c.g,c.b,a)}
function dk(h,n=50){const c=hexRgb(h);return{r:Math.max(0,c.r-n),g:Math.max(0,c.g-n),b:Math.max(0,c.b-n)}}
function lt(h,n=50){const c=hexRgb(h);return{r:Math.min(255,c.r+n),g:Math.min(255,c.g+n),b:Math.min(255,c.b+n)}}
function ell(x,y,rx,ry){ctx.beginPath();ctx.ellipse(x,y,Math.abs(rx),Math.abs(ry),0,0,Math.PI*2);ctx.fill()}
function sEll(x,y,rx,ry){ctx.beginPath();ctx.ellipse(x,y,Math.abs(rx),Math.abs(ry),0,0,Math.PI*2);ctx.stroke()}
function tri(x1,y1,x2,y2,x3,y3){ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.lineTo(x3,y3);ctx.closePath();ctx.fill()}

const mimes = [
  { color: 0x81D4FA, personality: 'aventurero',
    x: W/4, y: H*0.64, speed: 0.7, amp: 1.4, bounce: 0, phase: 0 },
  { color: 0xB39DDB, personality: 'tranquilo',
    x: W/2, y: H*0.64, speed: 1.5, amp: 0.6, bounce: 0, phase: 1 },
  { color: 0xFFCC80, personality: 'picaro',
    x: W*3/4, y: H*0.64, speed: 0.9, amp: 1.0, bounce: 0, phase: 2 },
];

let currentMood = 'contento';
let blinkTimer = 2000, blinkState = 0;

function drawMime(m, t) {
  const c = m.color;
  // Dark fur = much darker version of the color
  const fur = dk(c, 100);
  // Face/belly = very light warm version
  const face = lt(c, 70);
  // Belly = white/very light
  const belly = lt(c, 90);

  const breathe = Math.sin(t / (600 * m.speed)) * m.amp;
  const pupilX = Math.sin(t / 1200) * 2;
  const earWig = Math.sin(t / (1000 * m.speed)) * 3 * m.amp;
  const handWig = Math.sin(t / (800 * m.speed)) * 5 * m.amp;
  const mood = currentMood;

  let by = 0;
  if (m.bounce > 0) {
    by = -Math.sin(m.bounce * Math.PI) * 18;
    m.bounce = Math.max(0, m.bounce - 0.025);
  }

  const S = 0.62;
  ctx.save();
  ctx.translate(m.x, m.y + by);
  ctx.scale(S, S);

  ctx.save();
  ctx.scale(1, 1 + breathe * 0.003);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.06)';
  ell(0, 12, 50, 8);

  // ===== FEET (cream/light, wide, at very bottom) =====
  ctx.fillStyle = rgb(face.r, face.g, face.b);
  // Left foot - wide flat oval
  ell(-22, 6, 20, 10);
  // Right foot
  ell(22, 6, 20, 10);
  // Toe bumps on feet
  ctx.fillStyle = rgb(face.r - 15, face.g - 15, face.b - 10);
  ell(-32, 4, 5, 4); ell(-24, 2, 5, 4); ell(-16, 4, 5, 4);
  ell(16, 4, 5, 4); ell(24, 2, 5, 4); ell(32, 4, 5, 4);

  // ===== MAIN BODY SHAPE (one round/oval blob) =====
  // The whole body is covered in dark fur first
  ctx.fillStyle = rgb(fur.r, fur.g, fur.b);
  // Main body - round, slightly taller than wide
  ell(0, -52, 54, 58);

  // ===== BELLY + FACE (light area - one connected inverted-drop shape) =====
  // This is the key shape: a large light area covering the front
  // Goes from lower belly up through chest and face
  ctx.fillStyle = rgb(belly.r, belly.g, belly.b);
  // Big belly circle
  ell(0, -32, 38, 36);

  // Chest/upper belly connecting to face
  ctx.fillStyle = rgb(belly.r, belly.g, belly.b, 0.95);
  ell(0, -56, 30, 20);

  // Face area - cream colored, slightly warmer than belly
  ctx.fillStyle = rgb(face.r, face.g, face.b);
  ell(0, -72, 28, 24);

  ctx.restore(); // breathe

  // ===== HANDS/PAWS (small, round, dark, at mid-body sides) =====
  // Proportionally small compared to body, paw pads facing forward
  // Left paw
  ctx.save();
  ctx.translate(-54, -48);
  ctx.rotate((handWig - 15) * Math.PI / 180);
  ctx.fillStyle = rgb(fur.r, fur.g, fur.b);
  ell(0, 0, 12, 11);
  // Big center pad (facing forward)
  ctx.fillStyle = rgb(face.r - 15, face.g - 15, face.b - 10, 0.55);
  ell(0, 1, 6.5, 5.5);
  // Three toe beans on top
  ctx.fillStyle = rgb(face.r - 15, face.g - 15, face.b - 10, 0.4);
  ell(-4, -5, 3, 2.5); ell(0, -6, 3, 2.5); ell(4, -5, 3, 2.5);
  ctx.restore();

  // Right paw
  ctx.save();
  ctx.translate(54, -48);
  ctx.rotate((-handWig + 15) * Math.PI / 180);
  ctx.fillStyle = rgb(fur.r, fur.g, fur.b);
  ell(0, 0, 12, 11);
  ctx.fillStyle = rgb(face.r - 15, face.g - 15, face.b - 10, 0.55);
  ell(0, 1, 6.5, 5.5);
  ctx.fillStyle = rgb(face.r - 15, face.g - 15, face.b - 10, 0.4);
  ell(-4, -5, 3, 2.5); ell(0, -6, 3, 2.5); ell(4, -5, 3, 2.5);
  ctx.restore();

  // ===== CAT EARS (small, peeking from dark fur) =====
  const earY = -106;
  // Left ear
  ctx.save();
  ctx.translate(-20, earY);
  ctx.rotate((-6 + earWig) * Math.PI / 180);
  ctx.fillStyle = rgb(fur.r, fur.g, fur.b);
  tri(0, 8, -9, -10, 9, -10);
  ctx.fillStyle = rgb(face.r, face.g, face.b, 0.4);
  tri(0, 4, -5, -6, 5, -6);
  ctx.restore();
  // Right ear
  ctx.save();
  ctx.translate(20, earY);
  ctx.rotate((6 - earWig) * Math.PI / 180);
  ctx.fillStyle = rgb(fur.r, fur.g, fur.b);
  tri(0, 8, -9, -10, 9, -10);
  ctx.fillStyle = rgb(face.r, face.g, face.b, 0.4);
  tri(0, 4, -5, -6, 5, -6);
  ctx.restore();

  // ===== FLUFFY HAIR/FUR on top (dark, personality-based) =====
  const hB = -108;
  const hC = rgb(fur.r, fur.g, fur.b);
  const hL = rgb(fur.r + 25, fur.g + 25, fur.b + 25);

  if (m.personality === 'aventurero') {
    // Wild messy spikes
    ctx.fillStyle = hC;
    tri(-28, hB+28, -18, hB-8, -4, hB+20);
    tri(-14, hB+22, -2, hB-14, 10, hB+18);
    tri(0, hB+20, 12, hB-12, 24, hB+18);
    tri(10, hB+22, 22, hB-6, 32, hB+26);
    tri(-34, hB+30, -36, hB+10, -18, hB+22);
    tri(20, hB+20, 38, hB+8, 34, hB+28);
    tri(-8, hB+18, 4, hB-18, 16, hB+16);
    ctx.fillStyle = hL;
    tri(-10, hB+20, 0, hB-6, 8, hB+18);
    tri(4, hB+18, 14, hB-8, 20, hB+16);
  } else if (m.personality === 'tranquilo') {
    // Smooth round dome
    ctx.fillStyle = hC;
    ctx.beginPath();
    ctx.moveTo(-34, hB+32);
    ctx.quadraticCurveTo(-38, hB+4, -16, hB-6);
    ctx.quadraticCurveTo(0, hB-14, 16, hB-6);
    ctx.quadraticCurveTo(38, hB+4, 34, hB+32);
    ctx.quadraticCurveTo(18, hB+20, 0, hB+22);
    ctx.quadraticCurveTo(-18, hB+20, -34, hB+32);
    ctx.fill();
    ctx.fillStyle = hL;
    ctx.beginPath();
    ctx.moveTo(-22, hB+26);
    ctx.quadraticCurveTo(-24, hB+10, -8, hB+2);
    ctx.quadraticCurveTo(0, hB-2, 8, hB+2);
    ctx.quadraticCurveTo(24, hB+10, 22, hB+26);
    ctx.quadraticCurveTo(0, hB+18, -22, hB+26);
    ctx.fill();
  } else if (m.personality === 'picaro') {
    // Styled with quiff
    ctx.fillStyle = hC;
    ctx.beginPath();
    ctx.moveTo(-32, hB+32);
    ctx.quadraticCurveTo(-36, hB+2, -14, hB-4);
    ctx.quadraticCurveTo(0, hB-10, 14, hB-4);
    ctx.quadraticCurveTo(34, hB+2, 32, hB+32);
    ctx.quadraticCurveTo(14, hB+20, 0, hB+22);
    ctx.quadraticCurveTo(-14, hB+20, -32, hB+32);
    ctx.fill();
    tri(16, hB, 38, hB-24, 32, hB+6);
    tri(20, hB-4, 42, hB-20, 36, hB+2);
    tri(12, hB+2, 32, hB-18, 26, hB+6);
    ctx.fillStyle = hL;
    tri(18, hB-2, 36, hB-18, 30, hB+2);
  }

  // ===== DARK FUR framing the face (hood effect) =====
  // Left side of face frame
  ctx.fillStyle = rgb(fur.r, fur.g, fur.b);
  ctx.beginPath();
  ctx.moveTo(-28, -58);
  ctx.quadraticCurveTo(-36, -68, -32, -80);
  ctx.quadraticCurveTo(-34, -92, -28, -98);
  ctx.lineTo(-24, -92);
  ctx.quadraticCurveTo(-28, -82, -26, -72);
  ctx.quadraticCurveTo(-26, -62, -22, -56);
  ctx.closePath();
  ctx.fill();
  // Right side of face frame
  ctx.beginPath();
  ctx.moveTo(28, -58);
  ctx.quadraticCurveTo(36, -68, 32, -80);
  ctx.quadraticCurveTo(34, -92, 28, -98);
  ctx.lineTo(24, -92);
  ctx.quadraticCurveTo(28, -82, 26, -72);
  ctx.quadraticCurveTo(26, -62, 22, -56);
  ctx.closePath();
  ctx.fill();

  // ===== EYES (very large, round, close together) =====
  const eyeY = -78;
  const eyeSp = 15;
  const eRX = 16, eRY = 17;

  if (mood === 'dormido') {
    ctx.strokeStyle = '#444'; ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.arc(-eyeSp, eyeY, 12, 0.15, Math.PI - 0.15); ctx.stroke();
    ctx.beginPath(); ctx.arc(eyeSp, eyeY, 12, 0.15, Math.PI - 0.15); ctx.stroke();
    ctx.fillStyle = '#9E9E9E';
    ctx.font = 'bold 14px Arial';
    ctx.fillText('z', 34, eyeY - 16 + Math.sin(t/500)*4);
    ctx.font = 'bold 18px Arial';
    ctx.fillText('Z', 42, eyeY - 34 + Math.sin(t/500+1)*4);
  } else {
    const eo = mood === 'triste' ? 3 : 0;

    // Eye whites
    ctx.fillStyle = '#fff';
    ell(-eyeSp, eyeY + eo, eRX, eRY);
    ell(eyeSp, eyeY + eo, eRX, eRY);
    // Subtle outline
    ctx.strokeStyle = 'rgba(60,60,60,0.3)'; ctx.lineWidth = 1.5;
    sEll(-eyeSp, eyeY + eo, eRX, eRY);
    sEll(eyeSp, eyeY + eo, eRX, eRY);

    if (blinkState < 2) {
      // Large pupils
      const pR = mood === 'euforico' ? 11 : mood === 'enfadado' ? 7 : 9;
      ctx.fillStyle = '#222';
      ell(-eyeSp + pupilX, eyeY + eo + 1, pR, pR + 1);
      ell(eyeSp + pupilX, eyeY + eo + 1, pR, pR + 1);
      // Single large shine (like the reference)
      ctx.fillStyle = '#fff';
      ell(-eyeSp + pupilX + 4, eyeY + eo - 4, 4.5, 4.5);
      ell(eyeSp + pupilX + 4, eyeY + eo - 4, 4.5, 4.5);
    }
    if (blinkState >= 2) {
      ctx.fillStyle = rgb(face.r, face.g, face.b);
      ell(-eyeSp, eyeY + eo, eRX + 1, eRY + 1);
      ell(eyeSp, eyeY + eo, eRX + 1, eRY + 1);
    }
    if (mood === 'enfadado') {
      ctx.strokeStyle = '#333'; ctx.lineWidth = 3.5;
      ctx.beginPath(); ctx.moveTo(-eyeSp-14,eyeY-20); ctx.lineTo(-eyeSp+6,eyeY-15); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(eyeSp+14,eyeY-20); ctx.lineTo(eyeSp-6,eyeY-15); ctx.stroke();
    } else if (mood === 'triste') {
      ctx.strokeStyle = 'rgba(80,80,80,0.5)'; ctx.lineWidth = 2.5;
      ctx.beginPath(); ctx.moveTo(-eyeSp-12,eyeY-15); ctx.lineTo(-eyeSp+8,eyeY-19); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(eyeSp+12,eyeY-15); ctx.lineTo(eyeSp-8,eyeY-19); ctx.stroke();
    }
  }

  // ===== MUZZLE / HOCICO (small rounded bump below eyes) =====
  const muzzY = -60;
  ctx.fillStyle = rgb(face.r, face.g, face.b);
  ell(0, muzzY, 12, 9);

  // Nose (small dark oval on top of muzzle)
  ctx.fillStyle = rgb(fur.r + 20, fur.g + 20, fur.b + 20);
  ell(0, muzzY - 4, 5, 3.5);

  // ===== WHISKERS =====
  ctx.strokeStyle = 'rgba(100,100,100,0.25)';
  ctx.lineWidth = 0.8;
  ctx.beginPath(); ctx.moveTo(-12, muzzY-1); ctx.lineTo(-32, muzzY-6); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-12, muzzY+2); ctx.lineTo(-32, muzzY+3); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-11, muzzY+4); ctx.lineTo(-30, muzzY+11); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(12, muzzY-1); ctx.lineTo(32, muzzY-6); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(12, muzzY+2); ctx.lineTo(32, muzzY+3); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(11, muzzY+4); ctx.lineTo(30, muzzY+11); ctx.stroke();

  // ===== MOUTH (small, below muzzle) =====
  const moY = muzzY + 8;

  if (mood === 'euforico') {
    ctx.fillStyle = '#333';
    ctx.beginPath();
    ctx.moveTo(-10, moY);
    ctx.quadraticCurveTo(0, moY + 14, 10, moY);
    ctx.quadraticCurveTo(0, moY + 16, -10, moY);
    ctx.fill();
    ctx.fillStyle = '#E53935';
    ell(0, moY + 8, 5, 3.5);
  } else if (mood === 'contento') {
    ctx.strokeStyle = '#444'; ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(-9, moY);
    ctx.quadraticCurveTo(0, moY + 12, 9, moY);
    ctx.stroke();
  } else if (mood === 'triste') {
    ctx.strokeStyle = '#555'; ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(-8, moY + 6);
    ctx.quadraticCurveTo(0, moY - 1, 8, moY + 6);
    ctx.stroke();
  } else if (mood === 'enfadado') {
    ctx.strokeStyle = '#333'; ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.moveTo(-8, moY+1); ctx.lineTo(8, moY+2); ctx.stroke();
  } else if (mood === 'dormido') {
    ctx.fillStyle = '#555'; ell(0, moY + 2, 3.5, 3);
  }

  // Cheeks
  if (mood !== 'enfadado') {
    ctx.fillStyle = 'rgba(255,140,120,0.15)';
    ell(-22, muzzY, 8, 6);
    ell(22, muzzY, 8, 6);
  }

  ctx.restore();
}

function drawFloor() {
  ctx.fillStyle = 'rgba(188,170,164,0.12)';
  ctx.fillRect(0, H-45, W, 45);
}

function updateBlink(dt) {
  blinkTimer -= dt;
  if (blinkTimer <= 0) {
    if (blinkState === 0) { blinkState=1; blinkTimer=60; }
    else if (blinkState === 1) { blinkState=2; blinkTimer=80; }
    else if (blinkState === 2) { blinkState=3; blinkTimer=60; }
    else { blinkState=0; blinkTimer=2500+Math.random()*2000; }
  }
}

function handleTap(x,y) {
  mimes.forEach(m => {
    if (Math.abs(x-m.x)<50 && Math.abs(y-(m.y-50))<80) m.bounce=1;
  });
}
canvas.addEventListener('click', e => { const r=canvas.getBoundingClientRect(); handleTap(e.clientX-r.left, e.clientY-r.top); });
canvas.addEventListener('touchstart', e => { e.preventDefault(); const r=canvas.getBoundingClientRect(); const t=e.touches[0]; handleTap(t.clientX-r.left, t.clientY-r.top); });

document.querySelectorAll('.mood-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentMood = btn.dataset.mood;
  });
});

let lastTime = 0;
function loop(ts) {
  const dt=ts-lastTime; lastTime=ts;
  ctx.clearRect(0,0,W,H);
  drawFloor();
  updateBlink(dt);
  mimes.forEach(m => drawMime(m, ts+m.phase*800));
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
