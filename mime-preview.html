<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Mimes Care Corp - Preview</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: linear-gradient(180deg, #E8EAF6 0%, #FCE4EC 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    font-family: Arial, sans-serif;
    overflow: hidden;
  }
  h1 {
    color: #5C6BC0;
    font-size: 22px;
    margin-top: 16px;
    text-shadow: 0 1px 2px rgba(255,255,255,0.8);
  }
  .subtitle {
    color: #9E9E9E;
    font-size: 12px;
    margin-top: 4px;
  }
  canvas {
    margin-top: 10px;
    border-radius: 12px;
    touch-action: none;
  }
  .labels {
    display: flex;
    width: 100%;
    max-width: 400px;
    justify-content: space-around;
    margin-top: 8px;
  }
  .label {
    font-size: 13px;
    font-weight: bold;
    text-shadow: 0 1px 2px rgba(255,255,255,0.8);
    text-align: center;
  }
  .label small {
    display: block;
    font-weight: normal;
    font-size: 10px;
    color: #999;
    margin-top: 2px;
  }
  .hint {
    color: #BDBDBD;
    font-size: 11px;
    margin-top: 12px;
  }
  .mood-selector {
    display: flex;
    gap: 8px;
    margin-top: 12px;
    flex-wrap: wrap;
    justify-content: center;
    padding: 0 12px;
  }
  .mood-btn {
    padding: 6px 12px;
    border: 2px solid #C5CAE9;
    border-radius: 20px;
    background: white;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .mood-btn.active {
    background: #5C6BC0;
    color: white;
    border-color: #5C6BC0;
  }
</style>
</head>
<body>

<h1>Mimes Care Corp</h1>
<p class="subtitle">Preview de personalidades</p>

<canvas id="c"></canvas>

<div class="labels">
  <div class="label" style="color:#0288D1">Aventurero<small>Celeste · Rayas</small></div>
  <div class="label" style="color:#7E57C2">Tranquilo<small>Lila · Liso</small></div>
  <div class="label" style="color:#EF6C00">Picaro<small>Melocot&oacute;n · Manchas</small></div>
</div>

<div class="mood-selector">
  <button class="mood-btn active" data-mood="contento">😊 Contento</button>
  <button class="mood-btn" data-mood="euforico">🤩 Euf&oacute;rico</button>
  <button class="mood-btn" data-mood="triste">😢 Triste</button>
  <button class="mood-btn" data-mood="enfadado">😠 Enfadado</button>
  <button class="mood-btn" data-mood="dormido">😴 Dormido</button>
</div>

<p class="hint">Toca un Mime para interactuar</p>

<script>
// === CANVAS SETUP ===
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = Math.min(window.innerWidth, 420);
const H = Math.round(W * 1.1);
canvas.width = W * 2; // retina
canvas.height = H * 2;
canvas.style.width = W + 'px';
canvas.style.height = H + 'px';
ctx.scale(2, 2);

// === COLORES ===
function hexToRgb(hex) {
  return { r: (hex >> 16) & 255, g: (hex >> 8) & 255, b: hex & 255 };
}
function rgbStr(r, g, b, a = 1) { return `rgba(${r|0},${g|0},${b|0},${a})`; }
function colorStr(hex, a = 1) { const c = hexToRgb(hex); return rgbStr(c.r, c.g, c.b, a); }
function darker(hex, amt = 40) {
  const c = hexToRgb(hex);
  return { r: Math.max(0, c.r - amt), g: Math.max(0, c.g - amt), b: Math.max(0, c.b - amt) };
}
function lighter(hex, amt = 40) {
  const c = hexToRgb(hex);
  return { r: Math.min(255, c.r + amt), g: Math.min(255, c.g + amt), b: Math.min(255, c.b + amt) };
}

// === MIME DATA ===
const mimes = [
  {
    color: 0x81D4FA, personality: 'aventurero', fur: 'rayas',
    x: W / 4, y: H * 0.68, speed: 0.7, amp: 1.4, tailSpeed: 0.6,
    bounce: 0, bounceV: 0, phase: 0,
  },
  {
    color: 0xB39DDB, personality: 'tranquilo', fur: 'liso',
    x: W / 2, y: H * 0.68, speed: 1.5, amp: 0.6, tailSpeed: 1.8,
    bounce: 0, bounceV: 0, phase: 1,
  },
  {
    color: 0xFFCC80, personality: 'picaro', fur: 'manchas',
    x: W * 3 / 4, y: H * 0.68, speed: 0.9, amp: 1.0, tailSpeed: 1.0,
    bounce: 0, bounceV: 0, phase: 2,
  }
];

let currentMood = 'contento';
let blinkTimer = 0;
let blinkState = 0; // 0 = open, 1 = closing, 2 = closed, 3 = opening
let time = 0;

// === DRAW FUNCTIONS ===

function drawEllipse(cx, cy, rx, ry) {
  ctx.beginPath();
  ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
  ctx.fill();
}

function drawTriangle(x1, y1, x2, y2, x3, y3) {
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.lineTo(x3, y3);
  ctx.closePath();
  ctx.fill();
}

function drawMime(m, t) {
  const scale = 0.75;
  const col = m.color;
  const dk = darker(col);
  const lt = lighter(col);
  const breathe = Math.sin(t / (600 * m.speed)) * 2 * m.amp;
  const tailAngle = Math.sin(t / (400 * m.tailSpeed)) * 15 * m.amp * (Math.PI / 180);
  const earWiggle = Math.sin(t / (1000 * m.speed)) * 3 * m.amp;
  const pupilX = Math.sin(t / 1200) * 2;
  const armSwing = Math.sin(t / (900 * m.speed)) * 5 * m.amp * (Math.PI / 180);

  // Bounce animation
  let by = 0;
  if (m.bounce > 0) {
    by = -Math.sin(m.bounce * Math.PI) * 18;
    m.bounce = Math.max(0, m.bounce - 0.03);
  }

  ctx.save();
  ctx.translate(m.x, m.y + by);
  ctx.scale(scale, scale);

  // === COLA ===
  ctx.save();
  ctx.translate(38, -30);
  ctx.rotate(tailAngle);
  ctx.fillStyle = colorStr(col);
  drawEllipse(0, 0, 14, 11);
  ctx.fillStyle = rgbStr(lt.r, lt.g, lt.b, 0.6);
  drawEllipse(2, -2, 9, 7);
  ctx.restore();

  // === PATAS ===
  ctx.fillStyle = rgbStr(dk.r, dk.g, dk.b);
  drawEllipse(-22, 0, 13, 8);
  drawEllipse(22, 0, 13, 8);
  // Deditos
  ctx.fillStyle = colorStr(col, 0.8);
  [-28, -22, -16].forEach(x => { drawEllipse(x, -2, 3, 3); });
  [16, 22, 28].forEach(x => { drawEllipse(x, -2, 3, 3); });

  // === CUERPO ===
  ctx.save();
  ctx.translate(0, -40);
  ctx.scale(1, 1 + breathe * 0.005);

  // Cuerpo principal
  ctx.fillStyle = colorStr(col);
  drawEllipse(0, -20, 45, 35);
  drawEllipse(0, -50, 39, 30);

  // Barriga
  ctx.fillStyle = rgbStr(lt.r, lt.g, lt.b, 0.7);
  drawEllipse(0, -22, 27, 22);

  // Pelaje
  if (m.fur === 'rayas') {
    ctx.fillStyle = rgbStr(dk.r, dk.g, dk.b, 0.15);
    for (let i = 0; i < 4; i++) {
      const ry = -55 + i * 12;
      ctx.fillRect(-22, ry, 44, 3);
    }
  } else if (m.fur === 'manchas') {
    ctx.fillStyle = rgbStr(dk.r, dk.g, dk.b, 0.2);
    drawEllipse(-15, -55, 8, 7);
    drawEllipse(18, -38, 6, 6);
    drawEllipse(-8, -25, 9, 8);
    drawEllipse(22, -55, 5, 5);
  }
  ctx.restore();

  // === BRAZOS ===
  // Izquierdo
  ctx.save();
  ctx.translate(-42, -48);
  ctx.rotate(armSwing);
  ctx.fillStyle = colorStr(col);
  drawEllipse(0, 0, 10, 18);
  ctx.fillStyle = rgbStr(dk.r, dk.g, dk.b);
  drawEllipse(0, 14, 7, 6);
  ctx.restore();

  // Derecho
  ctx.save();
  ctx.translate(42, -48);
  ctx.rotate(-armSwing);
  ctx.fillStyle = colorStr(col);
  drawEllipse(0, 0, 10, 18);
  ctx.fillStyle = rgbStr(dk.r, dk.g, dk.b);
  drawEllipse(0, 14, 7, 6);
  ctx.restore();

  // === CABEZA ===
  ctx.save();
  ctx.translate(0, -85);

  // Forma cabeza
  ctx.fillStyle = colorStr(col);
  drawEllipse(0, 0, 40, 36);

  // Mejillas
  ctx.fillStyle = 'rgba(255,171,145,0.3)';
  drawEllipse(-26, 12, 9, 6);
  drawEllipse(26, 12, 9, 6);

  // === OREJAS ===
  // Izquierda
  ctx.save();
  ctx.translate(-24, -28);
  ctx.rotate(earWiggle * Math.PI / 180);
  ctx.fillStyle = colorStr(col);
  drawTriangle(0, 0, -14, -24, 14, -24);
  drawTriangle(-10, -20, 10, -20, 0, -30);
  ctx.fillStyle = 'rgba(255,171,145,0.5)';
  drawTriangle(0, -4, -8, -20, 8, -20);
  ctx.restore();

  // Derecha
  ctx.save();
  ctx.translate(24, -28);
  ctx.rotate(-earWiggle * Math.PI / 180);
  ctx.fillStyle = colorStr(col);
  drawTriangle(0, 0, -14, -24, 14, -24);
  drawTriangle(-10, -20, 10, -20, 0, -30);
  ctx.fillStyle = 'rgba(255,171,145,0.5)';
  drawTriangle(0, -4, -8, -20, 8, -20);
  ctx.restore();

  // === NARIZ ===
  ctx.fillStyle = 'rgba(255,171,145,1)';
  drawTriangle(0, 2, -4, 7, 4, 7);
  drawEllipse(0, 8, 6, 3);

  // === OJOS ===
  const mood = currentMood;
  const eyeYOffset = (mood === 'triste') ? 2 : 0;

  if (mood === 'dormido') {
    // Ojos cerrados con curva
    ctx.strokeStyle = '#555';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(-18, -2, 8, 0.2, Math.PI - 0.2);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(18, -2, 8, 0.2, Math.PI - 0.2);
    ctx.stroke();

    // ZZZ
    ctx.fillStyle = '#9E9E9E';
    ctx.font = 'bold 12px Arial';
    ctx.fillText('z', 30, -20 + Math.sin(t / 500) * 3);
    ctx.font = 'bold 16px Arial';
    ctx.fillText('z', 38, -32 + Math.sin(t / 500 + 1) * 3);
    ctx.font = 'bold 10px Arial';
    ctx.fillText('z', 46, -16 + Math.sin(t / 500 + 2) * 3);
  } else {
    // Ojo izquierdo
    ctx.fillStyle = '#fff';
    drawEllipse(-18, -4 + eyeYOffset, 12, 13);
    ctx.strokeStyle = 'rgba(51,51,51,0.3)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.ellipse(-18, -4 + eyeYOffset, 12, 13, 0, 0, Math.PI * 2);
    ctx.stroke();

    // Ojo derecho
    ctx.fillStyle = '#fff';
    drawEllipse(18, -4 + eyeYOffset, 12, 13);
    ctx.strokeStyle = 'rgba(51,51,51,0.3)';
    ctx.beginPath();
    ctx.ellipse(18, -4 + eyeYOffset, 12, 13, 0, 0, Math.PI * 2);
    ctx.stroke();

    // Pupilas
    if (blinkState === 0 || blinkState === 3) {
      const pSize = (mood === 'euforico') ? 9 : (mood === 'enfadado') ? 6 : 8;
      ctx.fillStyle = '#1a1a2e';
      drawEllipse(-18 + pupilX, -4 + eyeYOffset, pSize, pSize);
      drawEllipse(18 + pupilX, -4 + eyeYOffset, pSize, pSize);

      // Brillo
      ctx.fillStyle = '#fff';
      drawEllipse(-15 + pupilX, -7 + eyeYOffset, 3, 3);
      drawEllipse(21 + pupilX, -7 + eyeYOffset, 3, 3);
      drawEllipse(-20 + pupilX, -1 + eyeYOffset, 1.5, 1.5);
      drawEllipse(16 + pupilX, -1 + eyeYOffset, 1.5, 1.5);

      // Euforico: estrellitas en los ojos
      if (mood === 'euforico') {
        ctx.fillStyle = 'rgba(255,235,59,0.6)';
        drawStar(-18, -4, 3, 5, 4);
        drawStar(18, -4, 3, 5, 4);
      }
    }

    // Párpados (blink)
    if (blinkState === 1 || blinkState === 2) {
      ctx.fillStyle = colorStr(col);
      drawEllipse(-18, -4 + eyeYOffset, 13, 14);
      drawEllipse(18, -4 + eyeYOffset, 13, 14);
    }

    // Cejas enfadadas
    if (mood === 'enfadado') {
      ctx.strokeStyle = rgbStr(dk.r, dk.g, dk.b);
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(-26, -14);
      ctx.lineTo(-12, -10);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(26, -14);
      ctx.lineTo(12, -10);
      ctx.stroke();
    }

    // Ojos tristes: cejas caídas
    if (mood === 'triste') {
      ctx.strokeStyle = rgbStr(dk.r, dk.g, dk.b, 0.6);
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(-26, -12);
      ctx.lineTo(-12, -14);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(26, -12);
      ctx.lineTo(12, -14);
      ctx.stroke();
    }
  }

  // === BOCA ===
  ctx.translate(0, 14);
  if (mood === 'euforico') {
    ctx.fillStyle = '#555';
    drawEllipse(0, 0, 9, 6);
    ctx.fillStyle = 'rgba(239,83,80,0.6)';
    drawEllipse(0, 2, 5, 3);
  } else if (mood === 'contento') {
    ctx.strokeStyle = '#555';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.arc(0, -4, 8, 0.3, Math.PI - 0.3);
    ctx.stroke();
  } else if (mood === 'triste') {
    ctx.strokeStyle = '#555';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.arc(0, 6, 8, Math.PI + 0.3, -0.3);
    ctx.stroke();
  } else if (mood === 'enfadado') {
    ctx.strokeStyle = '#555';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(-8, 0);
    ctx.lineTo(8, 2);
    ctx.stroke();
  } else if (mood === 'dormido') {
    ctx.strokeStyle = '#555';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(-5, 0);
    ctx.lineTo(5, 0);
    ctx.stroke();
  }

  ctx.restore(); // cabeza
  ctx.restore(); // main
}

function drawStar(cx, cy, inner, outer, points) {
  ctx.beginPath();
  for (let i = 0; i < points * 2; i++) {
    const r = i % 2 === 0 ? outer : inner;
    const a = (i * Math.PI / points) - Math.PI / 2;
    const x = cx + Math.cos(a) * r;
    const y = cy + Math.sin(a) * r;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.fill();
}

// === SUELO ===
function drawFloor() {
  ctx.fillStyle = 'rgba(188,170,164,0.3)';
  ctx.fillRect(0, H - 60, W, 60);
  ctx.fillStyle = 'rgba(215,204,200,0.3)';
  ctx.fillRect(0, H - 60, W, 2);
}

// === BLINK LOGIC ===
function updateBlink(dt) {
  blinkTimer -= dt;
  if (blinkTimer <= 0) {
    if (blinkState === 0) {
      blinkState = 1;
      blinkTimer = 80;
    } else if (blinkState === 1) {
      blinkState = 2;
      blinkTimer = 60;
    } else if (blinkState === 2) {
      blinkState = 3;
      blinkTimer = 80;
    } else {
      blinkState = 0;
      blinkTimer = 2500 + Math.random() * 2000;
    }
  }
}

// === TOUCH / CLICK ===
canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  const x = (e.clientX - rect.left);
  const y = (e.clientY - rect.top);

  mimes.forEach(m => {
    const dx = x - m.x;
    const dy = y - (m.y - 50);
    if (Math.abs(dx) < 50 && Math.abs(dy) < 70) {
      m.bounce = 1;
    }
  });
});

canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const touch = e.touches[0];
  const x = touch.clientX - rect.left;
  const y = touch.clientY - rect.top;

  mimes.forEach(m => {
    const dx = x - m.x;
    const dy = y - (m.y - 50);
    if (Math.abs(dx) < 50 && Math.abs(dy) < 70) {
      m.bounce = 1;
    }
  });
});

// === MOOD BUTTONS ===
document.querySelectorAll('.mood-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentMood = btn.dataset.mood;
  });
});

// === RENDER LOOP ===
let lastTime = 0;

function loop(timestamp) {
  const dt = timestamp - lastTime;
  lastTime = timestamp;
  time = timestamp;

  ctx.clearRect(0, 0, W, H);
  drawFloor();
  updateBlink(dt);

  mimes.forEach(m => drawMime(m, timestamp + m.phase * 800));

  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>
</body>
</html>
