<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Mimes Care Corp - Preview</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: linear-gradient(180deg, #F5F5DC 0%, #FFF8E7 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    font-family: Arial, sans-serif;
    overflow-x: hidden;
  }
  h1 {
    color: #5C6BC0;
    font-size: 22px;
    margin-top: 14px;
    text-shadow: 0 1px 2px rgba(255,255,255,0.8);
  }
  .subtitle { color: #9E9E9E; font-size: 12px; margin-top: 2px; }
  canvas { margin-top: 6px; touch-action: none; }
  .labels {
    display: flex; width: 100%; max-width: 420px;
    justify-content: space-around; margin-top: 4px;
  }
  .label {
    font-size: 13px; font-weight: bold;
    text-shadow: 0 1px 2px rgba(255,255,255,0.8);
    text-align: center;
  }
  .label small { display: block; font-weight: normal; font-size: 10px; color: #999; margin-top: 1px; }
  .mood-selector {
    display: flex; gap: 6px; margin-top: 10px;
    flex-wrap: wrap; justify-content: center; padding: 0 8px;
  }
  .mood-btn {
    padding: 5px 10px; border: 2px solid #C5CAE9; border-radius: 20px;
    background: white; font-size: 12px; cursor: pointer; transition: all 0.2s;
  }
  .mood-btn.active { background: #5C6BC0; color: white; border-color: #5C6BC0; }
  .hint { color: #BDBDBD; font-size: 11px; margin-top: 8px; }
</style>
</head>
<body>

<h1>Mimes Care Corp</h1>
<p class="subtitle">Preview de personalidades</p>
<canvas id="c"></canvas>
<div class="labels">
  <div class="label" style="color:#0288D1">Aventurero<small>Pelo revuelto</small></div>
  <div class="label" style="color:#7E57C2">Tranquilo<small>Pelo peinado</small></div>
  <div class="label" style="color:#EF6C00">P&iacute;caro<small>Pelo con estilo</small></div>
</div>
<div class="mood-selector">
  <button class="mood-btn active" data-mood="contento">😊 Contento</button>
  <button class="mood-btn" data-mood="euforico">🤩 Euf&oacute;rico</button>
  <button class="mood-btn" data-mood="triste">😢 Triste</button>
  <button class="mood-btn" data-mood="enfadado">😠 Enfadado</button>
  <button class="mood-btn" data-mood="dormido">😴 Dormido</button>
</div>
<p class="hint">Toca un Mime para interactuar</p>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = Math.min(window.innerWidth, 420);
const H = Math.round(W * 1.2);
canvas.width = W * 2;
canvas.height = H * 2;
canvas.style.width = W + 'px';
canvas.style.height = H + 'px';
ctx.scale(2, 2);

// === HELPERS ===
function hexRgb(h) { return { r: (h >> 16) & 255, g: (h >> 8) & 255, b: h & 255 }; }
function rgb(r, g, b, a = 1) { return `rgba(${r|0},${g|0},${b|0},${a})`; }
function col(h, a = 1) { const c = hexRgb(h); return rgb(c.r, c.g, c.b, a); }
function dk(h, n = 50) { const c = hexRgb(h); return { r: Math.max(0,c.r-n), g: Math.max(0,c.g-n), b: Math.max(0,c.b-n) }; }
function lt(h, n = 50) { const c = hexRgb(h); return { r: Math.min(255,c.r+n), g: Math.min(255,c.g+n), b: Math.min(255,c.b+n) }; }
function ell(x, y, rx, ry) { ctx.beginPath(); ctx.ellipse(x, y, Math.abs(rx), Math.abs(ry), 0, 0, Math.PI*2); ctx.fill(); }
function tri(x1,y1,x2,y2,x3,y3) { ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.lineTo(x3,y3); ctx.closePath(); ctx.fill(); }
function sEll(x, y, rx, ry) { ctx.beginPath(); ctx.ellipse(x, y, Math.abs(rx), Math.abs(ry), 0, 0, Math.PI*2); ctx.stroke(); }

// === MIMES ===
const mimes = [
  { color: 0x81D4FA, personality: 'aventurero',
    x: W/4, y: H*0.65, speed: 0.7, amp: 1.4, bounce: 0, phase: 0 },
  { color: 0xB39DDB, personality: 'tranquilo',
    x: W/2, y: H*0.65, speed: 1.5, amp: 0.6, bounce: 0, phase: 1 },
  { color: 0xFFCC80, personality: 'picaro',
    x: W*3/4, y: H*0.65, speed: 0.9, amp: 1.0, bounce: 0, phase: 2 },
];

let currentMood = 'contento';
let blinkTimer = 2000, blinkState = 0;

// === DRAW MIME ===
function drawMime(m, t) {
  const c = m.color;
  const d = dk(c);
  const dd = dk(c, 90); // very dark for fur/hair
  const l = lt(c);
  const ll = lt(c, 80); // very light for belly/face
  const breathe = Math.sin(t / (600 * m.speed)) * m.amp;
  const pupilX = Math.sin(t / 1200) * 2;
  const earWig = Math.sin(t / (1000 * m.speed)) * 3 * m.amp;
  const handWig = Math.sin(t / (800 * m.speed)) * 5 * m.amp;
  const mood = currentMood;

  let by = 0;
  if (m.bounce > 0) {
    by = -Math.sin(m.bounce * Math.PI) * 20;
    m.bounce = Math.max(0, m.bounce - 0.025);
  }

  const S = 0.65;
  ctx.save();
  ctx.translate(m.x, m.y + by);
  ctx.scale(S, S);

  ctx.save();
  ctx.scale(1, 1 + breathe * 0.003);

  // ===== SHADOW =====
  ctx.fillStyle = 'rgba(0,0,0,0.07)';
  ell(0, 10, 48, 8);

  // ===== PATITAS (wide, short, close to body) =====
  // Skin color for feet
  ctx.fillStyle = rgb(ll.r, ll.g, ll.b);
  ell(-20, 4, 18, 10);
  ell(20, 4, 18, 10);
  // Toe bumps
  ctx.fillStyle = rgb(l.r, l.g, l.b);
  ell(-28, 2, 5, 4); ell(-20, 0, 5, 4); ell(-12, 2, 5, 4);
  ell(12, 2, 5, 4); ell(20, 0, 5, 4); ell(28, 2, 5, 4);

  // ===== BODY (pear/drop shape - one piece, wider at bottom) =====
  // Dark fur covers the whole back/sides
  ctx.fillStyle = rgb(dd.r, dd.g, dd.b);
  // Lower body - wider
  ell(0, -40, 52, 48);
  // Upper body/head area - slightly narrower, overlapping
  ell(0, -85, 46, 42);

  // ===== BELLY (big, light, front - penguin style) =====
  ctx.fillStyle = rgb(ll.r, ll.g, ll.b, 0.95);
  // Big belly from chest to bottom
  ell(0, -36, 36, 38);
  // Upper chest / neck area blending up
  ell(0, -62, 30, 22);

  // ===== FACE AREA (lighter skin color, cream/peach) =====
  const faceColor = rgb(ll.r, ll.g, ll.b);
  ctx.fillStyle = faceColor;
  // Face oval - the exposed skin between the dark fur
  ell(0, -88, 30, 28);

  ctx.restore(); // breathe

  // ===== MANITAS (paw-like, on sides of body) =====
  // Left hand
  ctx.save();
  ctx.translate(-50, -52);
  ctx.rotate((handWig - 10) * Math.PI / 180);
  // Dark fur hand
  ctx.fillStyle = rgb(dd.r, dd.g, dd.b);
  ell(0, 0, 14, 12);
  // Paw pads (lighter)
  ctx.fillStyle = rgb(l.r, l.g, l.b, 0.7);
  ell(-1, 2, 7, 6);
  // Toe pads
  ctx.fillStyle = rgb(l.r, l.g, l.b, 0.5);
  ell(-5, -4, 3, 3); ell(1, -5, 3, 3); ell(6, -3, 3, 3);
  ctx.restore();

  // Right hand
  ctx.save();
  ctx.translate(50, -52);
  ctx.rotate((-handWig + 10) * Math.PI / 180);
  ctx.fillStyle = rgb(dd.r, dd.g, dd.b);
  ell(0, 0, 14, 12);
  ctx.fillStyle = rgb(l.r, l.g, l.b, 0.7);
  ell(1, 2, 7, 6);
  ctx.fillStyle = rgb(l.r, l.g, l.b, 0.5);
  ell(-6, -3, 3, 3); ell(-1, -5, 3, 3); ell(5, -4, 3, 3);
  ctx.restore();

  // ===== CAT EARS (small, peeking from dark fur on top) =====
  const earBaseY = -122;

  ctx.save();
  ctx.translate(-22, earBaseY);
  ctx.rotate((-5 + earWig) * Math.PI / 180);
  ctx.fillStyle = rgb(dd.r, dd.g, dd.b);
  tri(0, 8, -10, -12, 10, -12);
  // Inner ear
  ctx.fillStyle = rgb(l.r, l.g, l.b, 0.5);
  tri(0, 3, -6, -8, 6, -8);
  ctx.restore();

  ctx.save();
  ctx.translate(22, earBaseY);
  ctx.rotate((5 - earWig) * Math.PI / 180);
  ctx.fillStyle = rgb(dd.r, dd.g, dd.b);
  tri(0, 8, -10, -12, 10, -12);
  ctx.fillStyle = rgb(l.r, l.g, l.b, 0.5);
  tri(0, 3, -6, -8, 6, -8);
  ctx.restore();

  // ===== HAIR / FUR ON TOP (dark, fluffy, personality-based) =====
  const hTop = -128;
  const hCol = rgb(dd.r, dd.g, dd.b);
  const hLit = rgb(dd.r + 20, dd.g + 20, dd.b + 20);

  if (m.personality === 'aventurero') {
    // Wild messy spikes - big and chaotic
    ctx.fillStyle = hCol;
    tri(-32, hTop + 30, -22, hTop - 10, -8, hTop + 22);
    tri(-18, hTop + 26, -6, hTop - 16, 8, hTop + 20);
    tri(-4, hTop + 22, 8, hTop - 18, 20, hTop + 18);
    tri(8, hTop + 24, 20, hTop - 12, 34, hTop + 28);
    // Extra wild
    tri(-36, hTop + 32, -40, hTop + 8, -20, hTop + 24);
    tri(24, hTop + 22, 40, hTop + 6, 36, hTop + 30);
    tri(-10, hTop + 20, 2, hTop - 22, 14, hTop + 18);
    // Highlights
    ctx.fillStyle = hLit;
    tri(-14, hTop + 24, -4, hTop - 8, 6, hTop + 20);
    tri(6, hTop + 22, 14, hTop - 10, 22, hTop + 20);
  } else if (m.personality === 'tranquilo') {
    // Smooth round fluffy dome - neat and adorable
    ctx.fillStyle = hCol;
    ctx.beginPath();
    ctx.moveTo(-38, hTop + 34);
    ctx.quadraticCurveTo(-42, hTop + 6, -18, hTop - 8);
    ctx.quadraticCurveTo(0, hTop - 16, 18, hTop - 8);
    ctx.quadraticCurveTo(42, hTop + 6, 38, hTop + 34);
    ctx.quadraticCurveTo(20, hTop + 22, 0, hTop + 24);
    ctx.quadraticCurveTo(-20, hTop + 22, -38, hTop + 34);
    ctx.fill();
    // Soft highlight
    ctx.fillStyle = hLit;
    ctx.beginPath();
    ctx.moveTo(-26, hTop + 28);
    ctx.quadraticCurveTo(-28, hTop + 10, -10, hTop);
    ctx.quadraticCurveTo(0, hTop - 4, 10, hTop);
    ctx.quadraticCurveTo(28, hTop + 10, 26, hTop + 28);
    ctx.quadraticCurveTo(0, hTop + 20, -26, hTop + 28);
    ctx.fill();
    // Gentle swoosh
    ctx.fillStyle = hCol;
    ctx.beginPath();
    ctx.moveTo(14, hTop - 6);
    ctx.quadraticCurveTo(24, hTop - 18, 18, hTop - 2);
    ctx.fill();
  } else if (m.personality === 'picaro') {
    // Styled with attitude - big quiff to one side
    ctx.fillStyle = hCol;
    ctx.beginPath();
    ctx.moveTo(-36, hTop + 34);
    ctx.quadraticCurveTo(-40, hTop + 4, -16, hTop - 4);
    ctx.quadraticCurveTo(0, hTop - 12, 16, hTop - 4);
    ctx.quadraticCurveTo(38, hTop + 4, 36, hTop + 34);
    ctx.quadraticCurveTo(18, hTop + 22, 0, hTop + 24);
    ctx.quadraticCurveTo(-18, hTop + 22, -36, hTop + 34);
    ctx.fill();
    // Big dramatic quiff
    tri(18, hTop - 2, 42, hTop - 28, 36, hTop + 6);
    tri(22, hTop - 6, 46, hTop - 24, 40, hTop + 2);
    tri(14, hTop, 36, hTop - 22, 30, hTop + 4);
    // Highlight
    ctx.fillStyle = hLit;
    tri(20, hTop - 4, 38, hTop - 22, 34, hTop + 2);
    // Curl on other side
    ctx.fillStyle = hCol;
    ctx.beginPath();
    ctx.moveTo(-24, hTop + 10);
    ctx.quadraticCurveTo(-38, hTop - 6, -22, hTop + 8);
    ctx.fill();
  }

  // ===== EYES (big, on face) =====
  const eyeY = -92;
  const eyeSp = 16;
  const eyeRX = 15, eyeRY = 17;

  if (mood === 'dormido') {
    ctx.strokeStyle = '#444'; ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.arc(-eyeSp, eyeY, 11, 0.2, Math.PI - 0.2); ctx.stroke();
    ctx.beginPath(); ctx.arc(eyeSp, eyeY, 11, 0.2, Math.PI - 0.2); ctx.stroke();
    ctx.fillStyle = '#9E9E9E';
    ctx.font = 'bold 14px Arial';
    ctx.fillText('z', 36, eyeY - 20 + Math.sin(t/500)*4);
    ctx.font = 'bold 18px Arial';
    ctx.fillText('Z', 44, eyeY - 38 + Math.sin(t/500+1)*4);
  } else {
    const eyeOff = mood === 'triste' ? 3 : 0;

    // Whites
    ctx.fillStyle = '#fff';
    ell(-eyeSp, eyeY + eyeOff, eyeRX, eyeRY);
    ell(eyeSp, eyeY + eyeOff, eyeRX, eyeRY);
    // Outline
    ctx.strokeStyle = '#333'; ctx.lineWidth = 2;
    sEll(-eyeSp, eyeY + eyeOff, eyeRX, eyeRY);
    sEll(eyeSp, eyeY + eyeOff, eyeRX, eyeRY);

    if (blinkState < 2) {
      const pR = mood === 'euforico' ? 10 : mood === 'enfadado' ? 6 : 8;
      ctx.fillStyle = '#1a1a2e';
      ell(-eyeSp + pupilX, eyeY + eyeOff + 1, pR, pR + 1);
      ell(eyeSp + pupilX, eyeY + eyeOff + 1, pR, pR + 1);
      // Shine
      ctx.fillStyle = '#fff';
      ell(-eyeSp + pupilX + 4, eyeY + eyeOff - 4, 4, 4);
      ell(eyeSp + pupilX + 4, eyeY + eyeOff - 4, 4, 4);
      ell(-eyeSp + pupilX - 2, eyeY + eyeOff + 3, 2, 2);
      ell(eyeSp + pupilX - 2, eyeY + eyeOff + 3, 2, 2);
    }
    // Blink
    if (blinkState >= 2) {
      ctx.fillStyle = rgb(ll.r, ll.g, ll.b);
      ell(-eyeSp, eyeY + eyeOff, eyeRX + 1, eyeRY + 1);
      ell(eyeSp, eyeY + eyeOff, eyeRX + 1, eyeRY + 1);
    }
    // Brows
    if (mood === 'enfadado') {
      ctx.strokeStyle = '#333'; ctx.lineWidth = 3.5;
      ctx.beginPath(); ctx.moveTo(-eyeSp - 14, eyeY - 20); ctx.lineTo(-eyeSp + 6, eyeY - 16); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(eyeSp + 14, eyeY - 20); ctx.lineTo(eyeSp - 6, eyeY - 16); ctx.stroke();
    } else if (mood === 'triste') {
      ctx.strokeStyle = rgb(d.r, d.g, d.b, 0.6); ctx.lineWidth = 2.5;
      ctx.beginPath(); ctx.moveTo(-eyeSp - 12, eyeY - 16); ctx.lineTo(-eyeSp + 8, eyeY - 20); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(eyeSp + 12, eyeY - 16); ctx.lineTo(eyeSp - 8, eyeY - 20); ctx.stroke();
    }
  }

  // ===== NOSE / HOCICO (rounded, protruding slightly) =====
  const noseY = -76;
  // Muzzle bump
  ctx.fillStyle = rgb(ll.r, ll.g, ll.b);
  ell(0, noseY, 14, 10);
  // Nose tip
  ctx.fillStyle = rgb(d.r, d.g, d.b, 0.8);
  ell(0, noseY - 4, 6, 4);

  // ===== WHISKERS =====
  ctx.strokeStyle = rgb(d.r, d.g, d.b, 0.3);
  ctx.lineWidth = 1;
  // Left whiskers
  ctx.beginPath(); ctx.moveTo(-14, noseY - 1); ctx.lineTo(-30, noseY - 6); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-14, noseY + 1); ctx.lineTo(-30, noseY + 4); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-13, noseY + 3); ctx.lineTo(-28, noseY + 12); ctx.stroke();
  // Right whiskers
  ctx.beginPath(); ctx.moveTo(14, noseY - 1); ctx.lineTo(30, noseY - 6); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(14, noseY + 1); ctx.lineTo(30, noseY + 4); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(13, noseY + 3); ctx.lineTo(28, noseY + 12); ctx.stroke();

  // ===== MOUTH =====
  const mY = noseY + 8;

  if (mood === 'euforico') {
    ctx.fillStyle = '#333';
    ctx.beginPath();
    ctx.moveTo(-14, mY);
    ctx.quadraticCurveTo(0, mY + 20, 14, mY);
    ctx.quadraticCurveTo(0, mY + 24, -14, mY);
    ctx.fill();
    ctx.fillStyle = '#E53935';
    ell(0, mY + 12, 6, 4);
  } else if (mood === 'contento') {
    ctx.strokeStyle = '#444'; ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(-12, mY);
    ctx.quadraticCurveTo(0, mY + 14, 12, mY);
    ctx.stroke();
  } else if (mood === 'triste') {
    ctx.strokeStyle = '#555'; ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(-10, mY + 8);
    ctx.quadraticCurveTo(0, mY - 2, 10, mY + 8);
    ctx.stroke();
  } else if (mood === 'enfadado') {
    ctx.strokeStyle = '#333'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(-10, mY + 2); ctx.lineTo(10, mY + 3); ctx.stroke();
  } else if (mood === 'dormido') {
    ctx.fillStyle = '#555';
    ell(0, mY + 2, 4, 3);
  }

  // ===== CHEEKS (rosy blush) =====
  if (mood !== 'enfadado') {
    ctx.fillStyle = 'rgba(255,140,120,0.2)';
    ell(-26, noseY + 2, 10, 7);
    ell(26, noseY + 2, 10, 7);
  }

  ctx.restore();
}

// === FLOOR ===
function drawFloor() {
  ctx.fillStyle = 'rgba(188,170,164,0.15)';
  ctx.fillRect(0, H - 50, W, 50);
}

// === BLINK ===
function updateBlink(dt) {
  blinkTimer -= dt;
  if (blinkTimer <= 0) {
    if (blinkState === 0) { blinkState = 1; blinkTimer = 60; }
    else if (blinkState === 1) { blinkState = 2; blinkTimer = 80; }
    else if (blinkState === 2) { blinkState = 3; blinkTimer = 60; }
    else { blinkState = 0; blinkTimer = 2500 + Math.random() * 2000; }
  }
}

// === INTERACTION ===
function handleTap(x, y) {
  mimes.forEach(m => {
    if (Math.abs(x - m.x) < 50 && Math.abs(y - (m.y - 50)) < 80) m.bounce = 1;
  });
}
canvas.addEventListener('click', e => {
  const r = canvas.getBoundingClientRect();
  handleTap(e.clientX - r.left, e.clientY - r.top);
});
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const r = canvas.getBoundingClientRect();
  const t = e.touches[0];
  handleTap(t.clientX - r.left, t.clientY - r.top);
});

document.querySelectorAll('.mood-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentMood = btn.dataset.mood;
  });
});

let lastTime = 0;
function loop(ts) {
  const dt = ts - lastTime; lastTime = ts;
  ctx.clearRect(0, 0, W, H);
  drawFloor();
  updateBlink(dt);
  mimes.forEach(m => drawMime(m, ts + m.phase * 800));
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
