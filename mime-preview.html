<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mimes Care Corp - Preview</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: #fefce8;
        background-image:
            radial-gradient(ellipse at 20% 80%, #fde68a33 0%, transparent 50%),
            radial-gradient(ellipse at 80% 20%, #bfdbfe22 0%, transparent 50%);
        font-family: 'Baloo 2', cursive;
        overflow: hidden;
        user-select: none;
    }

    .particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .particle {
        position: absolute; border-radius: 50%; opacity: 0.15;
        animation: float-particle linear infinite;
    }
    @keyframes float-particle {
        0% { transform: translateY(100vh) scale(0); opacity: 0; }
        10% { opacity: 0.15; } 90% { opacity: 0.15; }
        100% { transform: translateY(-10vh) scale(1); opacity: 0; }
    }

    .page-title {
        font-size: 28px; font-weight: 700; color: #5C6BC0;
        margin-bottom: 4px; z-index: 1;
        text-shadow: 0 2px 4px rgba(255,255,255,0.8);
        animation: fade-up 0.6s ease both;
    }
    .page-subtitle { font-size: 14px; color: #9E9E9E; margin-bottom: 12px; z-index: 1; }

    /* === 3 MIMES ROW === */
    .mimes-row {
        display: flex;
        justify-content: center;
        gap: 8px;
        z-index: 1;
        animation: scene-enter 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
    @keyframes scene-enter {
        from { opacity: 0; transform: translateY(40px) scale(0.9); }
        to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .mime-wrapper {
        display: flex; flex-direction: column; align-items: center;
    }

    /* === MOOD SELECTOR === */
    .mood-selector {
        display: flex; gap: 6px; margin-top: 14px; flex-wrap: wrap;
        justify-content: center; padding: 0 8px; z-index: 1;
    }
    .mood-btn {
        padding: 5px 12px; border: 2px solid #C5CAE9; border-radius: 20px;
        background: white; font-size: 13px; cursor: pointer; transition: all 0.2s;
        font-family: 'Baloo 2', cursive;
    }
    .mood-btn.active { background: #5C6BC0; color: white; border-color: #5C6BC0; }

    /* === CHARACTER (scaled down for 3) === */
    .scene {
        position: relative;
        display: flex; flex-direction: column; align-items: center;
    }
    .ground-shadow {
        width: 100px; height: 10px;
        background: rgba(26,26,46,0.12);
        border-radius: 50%; margin-top: -6px;
        filter: blur(5px);
        animation: shadow-breathe 3s ease-in-out infinite;
    }
    @keyframes shadow-breathe {
        0%, 100% { transform: scaleX(1); opacity: 0.5; }
        50% { transform: scaleX(1.08); opacity: 0.35; }
    }

    .character {
        position: relative;
        width: 150px; height: 180px;
        cursor: pointer;
        animation: breathe 3s ease-in-out infinite;
    }
    @keyframes breathe {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-4px); }
    }

    .body {
        position: absolute; bottom: 26px; left: 50%;
        transform: translateX(-50%);
        width: 120px; height: 132px;
        background: var(--body-color);
        border-radius: 50% 50% 45% 45%;
        overflow: hidden;
        box-shadow: inset -8px -6px 16px rgba(255,255,255,0.04), 0 4px 16px rgba(26,26,46,0.12);
    }
    .belly {
        position: absolute; bottom: -10px; left: 50%;
        transform: translateX(-50%);
        width: 100px; height: 112px;
        background: var(--belly-color);
        border-radius: 50%;
        box-shadow: inset 0 -6px 12px rgba(251,191,36,0.08);
    }

    /* Ears */
    .ear {
        position: absolute; top: 12px;
        width: 30px; height: 30px;
        background: var(--body-color); z-index: 1;
        transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .ear.left { left: 22px; border-radius: 5px 20px 5px 5px; transform: rotate(-15deg); }
    .ear.right { right: 22px; border-radius: 20px 5px 5px 5px; transform: rotate(15deg); }
    .ear::after {
        content: ''; position: absolute; top: 5px; left: 50%;
        transform: translateX(-50%);
        width: 15px; height: 15px;
        background: var(--ear-inner); border-radius: inherit; opacity: 0.4;
    }
    .character:hover .ear.left { transform: rotate(-25deg) translateY(-3px); }
    .character:hover .ear.right { transform: rotate(25deg) translateY(-3px); }

    /* Hair / Fur on top */
    .hair {
        position: absolute; top: 0; left: 50%; transform: translateX(-50%);
        z-index: 2; pointer-events: none;
    }
    .hair-tuft {
        position: absolute;
        background: var(--body-color);
    }

    /* Aventurero: wild spiky */
    .aventurero .hair { width: 80px; height: 35px; top: -2px; }
    .aventurero .hair-tuft:nth-child(1) {
        width: 16px; height: 26px; left: 8px; top: 2px;
        border-radius: 50% 50% 30% 30%;
        transform: rotate(-25deg);
    }
    .aventurero .hair-tuft:nth-child(2) {
        width: 14px; height: 30px; left: 22px; top: -4px;
        border-radius: 50% 50% 30% 30%;
        transform: rotate(-8deg);
    }
    .aventurero .hair-tuft:nth-child(3) {
        width: 16px; height: 28px; left: 34px; top: -2px;
        border-radius: 50% 50% 30% 30%;
        transform: rotate(10deg);
    }
    .aventurero .hair-tuft:nth-child(4) {
        width: 14px; height: 24px; left: 48px; top: 0px;
        border-radius: 50% 50% 30% 30%;
        transform: rotate(22deg);
    }
    .aventurero .hair-tuft:nth-child(5) {
        width: 12px; height: 20px; left: 58px; top: 4px;
        border-radius: 50% 50% 30% 30%;
        transform: rotate(35deg);
    }

    /* Tranquilo: smooth round dome */
    .tranquilo .hair { width: 90px; height: 30px; top: 0px; }
    .tranquilo .hair-tuft:nth-child(1) {
        width: 80px; height: 26px; left: 5px; top: 0px;
        border-radius: 50% 50% 40% 40%;
    }
    .tranquilo .hair-tuft:nth-child(2) {
        width: 60px; height: 18px; left: 15px; top: 2px;
        border-radius: 50%;
        opacity: 0.3;
        background: rgba(255,255,255,0.15);
    }

    /* Picaro: quiff/styled */
    .picaro .hair { width: 90px; height: 40px; top: -4px; }
    .picaro .hair-tuft:nth-child(1) {
        width: 70px; height: 22px; left: 6px; top: 10px;
        border-radius: 50% 50% 40% 40%;
    }
    .picaro .hair-tuft:nth-child(2) {
        width: 20px; height: 32px; left: 52px; top: -4px;
        border-radius: 60% 40% 30% 30%;
        transform: rotate(20deg);
    }
    .picaro .hair-tuft:nth-child(3) {
        width: 16px; height: 28px; left: 60px; top: 0px;
        border-radius: 50% 50% 30% 30%;
        transform: rotate(30deg);
    }
    .picaro .hair-tuft:nth-child(4) {
        width: 14px; height: 22px; left: 10px; top: 6px;
        border-radius: 50% 50% 30% 30%;
        transform: rotate(-18deg);
    }

    /* Collar */
    .collar {
        position: absolute; top: 78px; left: 50%;
        transform: translateX(-50%);
        width: 100px; height: 18px;
        background: var(--collar-color);
        border-radius: 50px; z-index: 10;
        box-shadow: 0 2px 0 rgba(0,0,0,0.04), inset 0 -2px 4px rgba(0,0,0,0.03);
    }

    /* Eyes */
    .eye {
        position: absolute; top: 40px;
        width: 40px; height: 50px;
        background: white; border-radius: 50%;
        z-index: 5; border: 1.5px solid #0f0f1a;
        overflow: hidden;
        box-shadow: inset 0 -2px 4px rgba(0,0,0,0.04);
    }
    .eye.left { left: 31px; }
    .eye.right { right: 31px; }

    .pupil {
        position: absolute; top: 14px; left: 50%;
        transform: translateX(-50%);
        width: 24px; height: 28px;
        background: #0f0f1a; border-radius: 50%;
        transition: transform 0.15s ease-out;
    }
    .pupil::before {
        content: ''; position: absolute; top: 4px; right: 3px;
        width: 8px; height: 8px;
        background: white; border-radius: 50%;
        animation: sparkle 2.5s ease-in-out infinite;
    }
    .pupil::after {
        content: ''; position: absolute; top: 14px; right: 5px;
        width: 4px; height: 4px;
        background: rgba(255,255,255,0.6); border-radius: 50%;
    }
    @keyframes sparkle {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.15); opacity: 0.8; }
    }

    .eye-lid {
        position: absolute; top: -1px; left: -1px; right: -1px;
        height: 0%; background: var(--body-color);
        z-index: 6; border-radius: 50% 50% 0 0;
        animation: blink 4s ease-in-out infinite;
    }
    @keyframes blink {
        0%, 95%, 100% { height: 0%; }
        97% { height: 100%; }
    }

    /* Blush */
    .blush {
        position: absolute; top: 72px;
        width: 18px; height: 10px;
        background: #fca5a5; border-radius: 50%;
        z-index: 8; opacity: 0.5; filter: blur(2px);
        transition: opacity 0.4s;
    }
    .blush.left { left: 26px; }
    .blush.right { right: 26px; }
    .character:hover .blush { opacity: 0.8; }

    /* Mouth */
    .mouth {
        position: absolute; top: 73px; left: 50%;
        transform: translateX(-50%);
        width: 24px; height: 20px; z-index: 15;
    }
    .mouth-upper {
        position: absolute; top: 0; left: 0;
        width: 24px; height: 11px;
        background: var(--beak-color);
        border-radius: 50% 50% 0 0 / 100% 100% 0 0;
        border: 1.5px solid #b45309; border-bottom: none;
        box-shadow: inset 0 2px 3px rgba(255,255,255,0.25);
        z-index: 2;
    }
    .mouth-lower {
        position: absolute; top: 10px; left: 2px;
        width: 20px; height: 9px;
        background: var(--beak-color);
        border-radius: 0 0 50% 50% / 0 0 100% 100%;
        border: 1.5px solid #b45309; border-top: none;
        transform-origin: top center;
        animation: mouth-talk 4s ease-in-out infinite;
        overflow: hidden;
    }
    .mouth-inside {
        position: absolute; top: 0; left: 50%;
        transform: translateX(-50%);
        width: 14px; height: 5px;
        background: #c0392b;
        border-radius: 0 0 50% 50%;
        opacity: 0;
        animation: tongue-show 4s ease-in-out infinite;
    }
    @keyframes mouth-talk {
        0%, 35%, 100% { transform: scaleY(1) translateY(0); }
        6% { transform: scaleY(1.8) translateY(2px); }
        12% { transform: scaleY(0.7) translateY(0); }
        18% { transform: scaleY(1.6) translateY(2px); }
        24% { transform: scaleY(0.9) translateY(0); }
        28% { transform: scaleY(1.4) translateY(1px); }
    }
    @keyframes tongue-show {
        0%, 35%, 100% { opacity: 0; }
        6% { opacity: 1; } 12% { opacity: 0; }
        18% { opacity: 1; } 24% { opacity: 0; }
        28% { opacity: 0.8; }
    }

    /* Heart hands */
    .hand {
        position: absolute; top: 96px; z-index: 20;
    }
    .hand.left {
        left: -2px;
        animation: wave-left 2.8s ease-in-out infinite;
        transform-origin: right center;
    }
    .hand.right {
        right: -2px;
        animation: wave-right 2.8s ease-in-out infinite;
        transform-origin: left center;
    }
    .heart-shape {
        position: relative; width: 22px; height: 20px;
    }
    .heart-shape::before, .heart-shape::after {
        content: ''; position: absolute; top: 0;
        width: 12px; height: 18px;
        background: var(--body-color);
        border-radius: 12px 12px 0 0;
    }
    .heart-shape::before {
        left: 0; transform: rotate(-45deg); transform-origin: 100% 100%;
    }
    .heart-shape::after {
        right: 0; transform: rotate(45deg); transform-origin: 0 100%;
    }
    @keyframes wave-left {
        0%, 100% { transform: rotate(0deg); }
        20% { transform: rotate(-18deg); }
        40% { transform: rotate(8deg); }
        60% { transform: rotate(-12deg); }
        80% { transform: rotate(4deg); }
    }
    @keyframes wave-right {
        0%, 100% { transform: rotate(0deg); }
        15% { transform: rotate(18deg); }
        35% { transform: rotate(-8deg); }
        55% { transform: rotate(12deg); }
        75% { transform: rotate(-4deg); }
    }
    .character:hover .hand.left {
        animation: wave-left-fast 0.5s ease-in-out infinite;
    }
    .character:hover .hand.right {
        animation: wave-right-fast 0.5s ease-in-out infinite;
    }
    @keyframes wave-left-fast {
        0%, 100% { transform: rotate(0deg); }
        50% { transform: rotate(-28deg) translateY(-4px); }
    }
    @keyframes wave-right-fast {
        0%, 100% { transform: rotate(0deg); }
        50% { transform: rotate(28deg) translateY(-4px); }
    }

    /* Feet */
    .foot {
        position: absolute; bottom: 16px;
        width: 32px; height: 20px;
        background: var(--beak-color);
        border-radius: 12px 12px 6px 6px;
        border: 1.5px solid #b45309;
        box-shadow: inset 0 -2px 3px rgba(180,83,9,0.12), 0 1px 2px rgba(26,26,46,0.12);
    }
    .foot.left { left: 38px; }
    .foot.right { right: 38px; }
    .foot::before {
        content: ''; position: absolute; top: 4px; left: 50%;
        transform: translateX(-50%);
        width: 16px; height: 10px;
        border-left: 1.5px solid rgba(180,83,9,0.2);
        border-right: 1.5px solid rgba(180,83,9,0.2);
    }

    /* Tail */
    .tail {
        position: absolute; bottom: 38px; right: 8px;
        width: 8px; height: 26px;
        background: var(--body-color);
        border-radius: 6px 6px 50% 50%;
        transform-origin: bottom center;
        animation: wag 2s ease-in-out infinite;
        z-index: -1;
    }
    .tail::after {
        content: ''; position: absolute; top: -4px; left: 50%;
        transform: translateX(-50%);
        width: 10px; height: 10px;
        background: var(--body-color); border-radius: 50%;
    }
    @keyframes wag {
        0%, 100% { transform: rotate(-15deg); }
        50% { transform: rotate(15deg); }
    }

    /* Heart burst on click */
    .heart-burst { position: absolute; pointer-events: none; z-index: 100; }
    .mini-heart {
        position: absolute; font-size: 14px;
        animation: heart-fly 1s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        opacity: 0;
    }
    @keyframes heart-fly {
        0% { transform: translate(0, 0) scale(0) rotate(0deg); opacity: 1; }
        60% { opacity: 1; }
        100% { transform: translate(var(--tx), var(--ty)) scale(1.2) rotate(var(--rot)); opacity: 0; }
    }

    .mime-label {
        margin-top: 8px; font-size: 15px; font-weight: 700;
        letter-spacing: 0.5px;
        opacity: 0;
        animation: fade-up 0.6s 0.5s ease both;
    }
    .mime-sublabel {
        font-size: 11px; color: #999; font-weight: 500;
    }
    @keyframes fade-up {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .hint {
        color: #BDBDBD; font-size: 12px; margin-top: 14px; z-index: 1;
    }

    /* ====== COLOR THEMES ====== */
    .mime-celeste {
        --body-color: #1565C0;
        --belly-color: #E3F2FD;
        --collar-color: #BBDEFB;
        --beak-color: #FFB74D;
        --ear-inner: #1E88E5;
    }
    .mime-lila {
        --body-color: #6A1B9A;
        --belly-color: #F3E5F5;
        --collar-color: #E1BEE7;
        --beak-color: #FFB74D;
        --ear-inner: #8E24AA;
    }
    .mime-melocoton {
        --body-color: #E65100;
        --belly-color: #FFF3E0;
        --collar-color: #FFE0B2;
        --beak-color: #FFB74D;
        --ear-inner: #F4511E;
    }
</style>
</head>
<body>

<script>
// Eye tracking
document.addEventListener('mousemove', track);
document.addEventListener('touchmove', e => {
  const t = e.touches[0];
  track({ clientX: t.clientX, clientY: t.clientY });
});

function track(e) {
  document.querySelectorAll('.character').forEach(ch => {
    const rect = ch.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height * 0.3;
    const dx = e.clientX - cx;
    const dy = e.clientY - cy;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const max = 5;
    const mx = (dx / dist) * Math.min(dist * 0.02, max);
    const my = (dy / dist) * Math.min(dist * 0.02, max);
    ch.querySelectorAll('.pupil').forEach(p => {
      p.style.transform = `translate(calc(-50% + ${mx}px), ${my}px)`;
    });
  });
}

// Click interaction
const phrases = ['¡Hola! 🐾','Miau~ 💕','¡Te quiero!','Noot noot! 🐧','*purrs* ✨','¡Abrazo! 🤗','Nya~ 🎀','♪ ♫ ♪'];
let idx = 0;

document.querySelectorAll('.character').forEach(ch => {
  ch.addEventListener('click', e => {
    const burst = document.createElement('div');
    burst.className = 'heart-burst';
    const rect = ch.getBoundingClientRect();
    burst.style.left = (e.clientX - rect.left) + 'px';
    burst.style.top = (e.clientY - rect.top) + 'px';

    const hearts = ['❤️','💛','💖','🧡','💜','💗'];
    for (let i = 0; i < 6; i++) {
      const h = document.createElement('div');
      h.className = 'mini-heart';
      h.textContent = hearts[i];
      const a = (Math.PI * 2 / 6) * i + (Math.random() - 0.5);
      const r = 30 + Math.random() * 25;
      h.style.setProperty('--tx', `${Math.cos(a)*r}px`);
      h.style.setProperty('--ty', `${Math.sin(a)*r - 20}px`);
      h.style.setProperty('--rot', `${(Math.random()-0.5)*60}deg`);
      h.style.animationDelay = `${i*0.05}s`;
      burst.appendChild(h);
    }
    ch.appendChild(burst);
    setTimeout(() => burst.remove(), 1200);
  });
});

// Particles
const particlesEl = document.getElementById('particles');
const colors = ['#fbbf24','#fca5a5','#a5b4fc','#86efac','#fde68a'];
for (let i = 0; i < 15; i++) {
  const p = document.createElement('div');
  p.className = 'particle';
  const s = 4 + Math.random() * 8;
  p.style.width = s + 'px'; p.style.height = s + 'px';
  p.style.left = Math.random() * 100 + '%';
  p.style.background = colors[Math.floor(Math.random() * colors.length)];
  p.style.animationDuration = (8 + Math.random() * 12) + 's';
  p.style.animationDelay = (Math.random() * 10) + 's';
  particlesEl.appendChild(p);
}
</script>
